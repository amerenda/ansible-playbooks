[controllers]
rpi5-0 ansible_host=10.100.20.10
rpi5-1 ansible_host=10.100.20.11
rpi4-0 ansible_host=10.100.20.12

[agents]
archlinux ansible_host=10.100.20.25 ansible_connection=local archlinux_ip=10.100.20.25

# Workstations (Komodo Periphery / Cachy bootstrap); not k3s members unless also in [agents].
[computers]
archlinux
lemurpro ansible_host=10.100.20.26 ansible_connection=local archlinux_ip=10.100.20.26

# Single-host pattern for Arch k3s agent-only runs (optional; use with -e k3s_agent_hosts=archlinux_k3s)
[archlinux_k3s]
archlinux

# Hosts that run Komodo Periphery for komodo-dean-gitops
[archlinux_komodo_hosts]
archlinux
lemurpro

[cachyos_workstations]
archlinux
lemurpro

[murderbot_komodo_hosts]
murderbot ansible_host=10.100.20.19

[rpi5_hosts]
rpi5-0
rpi5-1

[gpu_hosts]
murderbot
archlinux ansible_host=10.100.20.25 ansible_connection=local archlinux_ip=10.100.20.25

[macmini_hosts]
mac-mini-m4 ansible_host=10.100.20.18

# k3s cluster members (controllers + agents). Loads group_vars/k3s.yml for every member.
[k3s:children]
controllers
agents

# Raspberry Pi k3s nodes (controllers + Pi workers when present). Loads group_vars/pis.yml.
[pis:children]
controllers

# RPi prep playbook (setup-rpi.yml); today only rpi5 data-plane helpers — controllers use pis for vars.
[rpi:children]
rpi5_hosts

# Bare-metal servers (non-cluster Docker/Komodo hosts). Shared keys in group_vars/servers.yml.
[servers:children]
macmini_hosts
murderbot_komodo_hosts

[longhorn_nodes:children]
controllers
agents
gpu_k3s

[gpu_k3s]
murderbot

# No storage-only nodes; post-k3s uses groups['storage_only'] | default([]).

[all:vars]
ansible_user=alex
ansible_ssh_private_key_file=~/.ssh/alex_id_ed25519
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_python_interpreter=/usr/bin/python3
