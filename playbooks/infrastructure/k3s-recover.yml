---
# k3s Cluster Recovery Playbook
#
# Brings the k3s cluster back to a healthy state. Handles:
#   - Token mismatch (bootstrap data encrypted with different token)
#   - Missing config files (node was wiped/reinstalled)
#   - Empty tmpfs after reboot (etcd rejoins from peers)
#   - Full cluster power loss (restores from snapshot)
#   - Stale etcd-tmp directories from failed reconciliation
#   - Undersized tmpfs (live resize)
#
# This playbook is SAFE to run on a healthy cluster — it will detect
# that everything is fine and make no changes (unless force flags are set).
#
# Usage (preferred — fetch token from BWS):
#   # Normal recovery:
#   ansible-playbook -i inventory/inventory.ini playbooks/infrastructure/k3s-recover.yml \
#     -e bws_access_token=<BWS_TOKEN>
#
#   # Force snapshot restore:
#   ansible-playbook -i inventory/inventory.ini playbooks/infrastructure/k3s-recover.yml \
#     -e bws_access_token=<BWS_TOKEN> -e force_restore=true --limit rpi5-1
#
#   # Rotate token:
#   ansible-playbook -i inventory/inventory.ini playbooks/infrastructure/k3s-recover.yml \
#     -e bws_access_token=<BWS_TOKEN> -e rotate_token=true
#
# The k3s_token value in BWS should be the cluster password (not the full K10... format).
#
# Secrets: k3s_token is always read from BWS via bws — the only extra-var allowed is bws_access_token.

- name: Fetch secrets for recovery
  hosts: localhost
  connection: local
  gather_facts: true
  tags: [k3s, etcd, recover]
  vars_files:
    - ../../group_vars/k3s.yml
  tasks:
    - name: Require BWS access token
      ansible.builtin.assert:
        that:
          - bws_access_token is defined
          - bws_access_token | length > 0
        fail_msg: |
          bws_access_token is required. k3s_token is read only from Bitwarden Secrets Manager via bws:
            -e bws_access_token=<BWS_ACCESS_TOKEN>

    - name: Fetch k3s_token from BWS
      when:
        - bws_secrets is defined
        - bws_secrets.k3s_token | default('') | length > 0
      block:
        - name: Find bws CLI on PATH
          ansible.builtin.command: which bws
          register: bws_which
          changed_when: false
          failed_when: false

        - name: Fail if bws CLI not installed
          ansible.builtin.fail:
            msg: |
              bws CLI not found on PATH. Run fetch-secrets.yml first, or install manually:
                See playbooks/infrastructure/fetch-secrets.yml for install steps
          when: bws_which.rc != 0

        - name: Fetch k3s_token from BWS
          ansible.builtin.command: >-
            {{ bws_which.stdout }} secret get {{ bws_secrets.k3s_token }}
            --access-token {{ bws_access_token }}
            --output json
          register: bws_token_result
          no_log: true
          changed_when: false

        - name: Set k3s_token from BWS
          ansible.builtin.set_fact:
            k3s_token: "{{ (bws_token_result.stdout | from_json).value }}"
          no_log: true

- name: Recover k3s cluster
  hosts: controllers
  become: yes
  gather_facts: yes
  serial: 1
  tags: [k3s, etcd, recover]

  vars:
    k3s_config_path: /etc/rancher/k3s/config.yaml
    k3s_data_dir: /var/lib/rancher/k3s
    k3s_server_dir: /var/lib/rancher/k3s/server
    etcd_data_dir: /var/lib/rancher/k3s/server/db
    etcd_mount_dir: /var/lib/rancher/k3s/server/db/etcd
    snapshot_dir: /var/lib/rancher/k3s/server/db/snapshots
    tmpfs_size: "1G"

    # etcdctl
    etcd_version: "v3.5.21"
    etcdctl_path: /usr/local/bin/etcdctl
    etcd_certs: >-
      --endpoints=https://127.0.0.1:2379
      --cert=/var/lib/rancher/k3s/server/tls/etcd/server-client.crt
      --key=/var/lib/rancher/k3s/server/tls/etcd/server-client.key
      --cacert=/var/lib/rancher/k3s/server/tls/etcd/server-ca.crt

    # Cluster networking (must match existing cluster)
    cluster_cidr: "10.42.0.0/16"
    service_cidr: "10.43.0.0/16"
    cluster_dns: "10.43.0.10"

    # etcd snapshot config
    etcd_snapshot_schedule: "*/5 * * * *"
    etcd_snapshot_retention: 12
    etcd_snapshot_compress: true

    # Controller topology
    controller_ips: "{{ groups['controllers'] | map('extract', hostvars, 'ansible_host') | list }}"
    first_controller: "{{ groups['controllers'][0] }}"
    is_first_controller: "{{ inventory_hostname == first_controller }}"

    # Peer to join from (not self)
    peer_node: "{{ groups['controllers'] | difference([inventory_hostname]) | first }}"
    peer_ip: "{{ hostvars[peer_node]['ansible_host'] }}"

    # Priority order for snapshot restore on full power loss
    restore_priority: ["rpi5-1", "rpi5-0", "rpi4-0"]

    # Flags (pass via -e)
    do_force_restore: "{{ force_restore | default(false) | bool }}"
    do_rotate_token: "{{ rotate_token | default(false) | bool }}"

  pre_tasks:
    - name: Use k3s_token from BWS (fetched in previous play)
      ansible.builtin.set_fact:
        k3s_token: "{{ hostvars['localhost']['k3s_token'] }}"
      when:
        - k3s_token is not defined or k3s_token == ""
        - hostvars['localhost']['k3s_token'] is defined
      no_log: true

    - name: Validate k3s_token is available
      assert:
        that: k3s_token is defined and k3s_token | length > 0
        fail_msg: |
          k3s_token could not be loaded from BWS. Check bws_secrets.k3s_token in group_vars/k3s.yml
          and run with: -e bws_access_token=<BWS_ACCESS_TOKEN>

    - name: Validate force_restore is used with --limit
      assert:
        that: ansible_play_hosts | length == 1
        fail_msg: |
          force_restore=true must be used with --limit to target ONE node.
          That node restores from snapshot, then run without force_restore
          on the others so they rejoin.
          Example: --limit rpi5-1 -e force_restore=true
      when: do_force_restore | bool

    # --- Detect current state ---

    - name: Check if k3s is installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Check if k3s config exists
      stat:
        path: "{{ k3s_config_path }}"
      register: k3s_config_exists

    - name: Check if k3s is running and healthy
      shell: >-
        systemctl is-active k3s 2>/dev/null || echo "inactive"
      register: k3s_state
      changed_when: false

    - name: Check k3s API health
      shell: >-
        curl -sk --connect-timeout 3 -o /dev/null -w '%{http_code}'
        https://{{ ansible_host }}:6443/healthz 2>/dev/null || echo "000"
      register: k3s_api_status
      changed_when: false

    - name: Check k3s restart count
      shell: systemctl show k3s --property=NRestarts --value 2>/dev/null || echo "0"
      register: k3s_restart_count
      changed_when: false

    - name: Detect crash-looping k3s
      set_fact:
        k3s_crash_loop: >-
          {{ k3s_state.stdout in ['activating', 'active'] and
             (k3s_api_status.stdout == '000' or k3s_restart_count.stdout | int > 2) }}

    - name: Check if tmpfs is mounted
      shell: mountpoint -q {{ etcd_mount_dir }} && echo "mounted" || echo "not_mounted"
      register: tmpfs_state
      changed_when: false

    - name: Check if tmpfs is in fstab
      shell: grep -q '{{ etcd_mount_dir }}' /etc/fstab && echo "in_fstab" || echo "not_in_fstab"
      register: fstab_state
      changed_when: false

    - name: Check current tmpfs size
      shell: >-
        df --output=size -BM {{ etcd_mount_dir }} 2>/dev/null | tail -1 | tr -d ' M'
      register: current_tmpfs_size_mb
      changed_when: false
      when: tmpfs_state.stdout == "mounted"

    - name: Check if etcd data exists on tmpfs
      shell: ls {{ etcd_mount_dir }}/member/snap/db 2>/dev/null && echo "has_data" || echo "empty"
      register: etcd_data_state
      changed_when: false

    - name: Check for stale etcd-tmp directory
      stat:
        path: "{{ etcd_data_dir }}/etcd-tmp"
      register: etcd_tmp_exists

    - name: Check for snapshots
      shell: ls -t {{ snapshot_dir }}/etcd-snapshot-* 2>/dev/null | head -1
      register: latest_snapshot
      changed_when: false
      failed_when: false

    - name: Read current token from config (if exists)
      shell: >-
        grep '^token:' {{ k3s_config_path }} 2>/dev/null |
        head -1 | sed 's/^token: *//' | tr -d '"'
      register: current_config_token
      changed_when: false
      failed_when: false

    - name: Read token from server token file (if exists)
      shell: cat {{ k3s_server_dir }}/token 2>/dev/null
      register: server_token_file
      changed_when: false
      failed_when: false

    - name: Check k3s logs for token mismatch error
      shell: >-
        journalctl -u k3s --no-pager --since '5 minutes ago' 2>/dev/null |
        grep -c 'encrypted with different token' || echo "0"
      register: token_mismatch_count
      changed_when: false

    # --- Cluster health check (informational in recovery mode) ---
    # In recovery, we don't FAIL on unhealthy nodes (that's why we're recovering),
    # but we log the state so the operator knows what they're working with.

    - name: Check cluster health (informational)
      ansible.builtin.command: kubectl get nodes -o json
      register: recovery_node_status
      delegate_to: "{{ groups['controllers'][0] }}"
      changed_when: false
      failed_when: false

    - name: Show cluster node status
      ansible.builtin.debug:
        msg: >-
          Cluster nodes:
          {% set nodes = (recovery_node_status.stdout | default('{"items":[]}') | from_json)['items'] | default([]) %}
          {% for node in nodes %}
          {%   set ready = 'Unknown' %}
          {%   for cond in node.status.conditions | default([]) %}
          {%     if cond.type == 'Ready' %}{% set ready = cond.status %}{% endif %}
          {%   endfor %}
          {{ node.metadata.name }}={{ ready }}{{ ', ' if not loop.last else '' }}
          {%- endfor %}
          {{ 'unable to query cluster' if nodes | length == 0 else '' }}
      when: recovery_node_status.rc | default(1) == 0

    # --- Summarize state ---

    - name: Summarize node state
      debug:
        msg: |
          === {{ inventory_hostname }} ({{ ansible_host }}) ===
          k3s installed:      {{ k3s_binary.stat.exists }}
          k3s state:          {{ k3s_state.stdout }}
          k3s API:            {{ k3s_api_status.stdout }}
          config exists:      {{ k3s_config_exists.stat.exists }}
          tmpfs in fstab:     {{ fstab_state.stdout }}
          tmpfs mounted:      {{ tmpfs_state.stdout }}
          tmpfs size:         {{ current_tmpfs_size_mb.stdout | default('N/A') }}M (want {{ tmpfs_size }})
          etcd has data:      {{ etcd_data_state.stdout }}
          etcd-tmp exists:    {{ etcd_tmp_exists.stat.exists }}
          latest snapshot:    {{ latest_snapshot.stdout | default('NONE') }}
          token mismatches:   {{ token_mismatch_count.stdout }}
          --- flags ---
          force_restore:      {{ do_force_restore }}
          rotate_token:       {{ do_rotate_token }}

    # --- Determine what needs fixing ---

    - name: Set recovery flags
      set_fact:
        needs_config: "{{ not k3s_config_exists.stat.exists }}"
        needs_tmpfs_fstab: "{{ fstab_state.stdout == 'not_in_fstab' }}"
        needs_tmpfs_mount: "{{ tmpfs_state.stdout == 'not_mounted' }}"
        needs_tmpfs_resize: "{{ tmpfs_state.stdout == 'mounted' and (current_tmpfs_size_mb.stdout | default('0') | int) < 1024 }}"
        needs_token_fix: "{{ token_mismatch_count.stdout | int > 0 }}"
        needs_etcd_tmp_cleanup: "{{ etcd_tmp_exists.stat.exists }}"
        needs_restart: false

  tasks:
    # =============================================
    # PHASE 0: Token rotation (live, on running cluster)
    # =============================================

    - name: Confirm token rotation
      ansible.builtin.include_tasks: ../../tasks/confirm-destructive.yml
      vars:
        destructive_action: "rotate k3s cluster token on {{ inventory_hostname }}"
        skipped_checks: "cluster health gate (token rotation changes auth for all nodes)"
      when:
        - do_rotate_token | bool
        - inventory_hostname == ansible_play_hosts[0]

    - name: Rotate cluster token
      shell: >-
        k3s token rotate --new-token '{{ k3s_token }}'
      register: token_rotated
      when:
        - do_rotate_token | bool
        - k3s_state.stdout == 'active'
        - inventory_hostname == ansible_play_hosts[0]
      no_log: true

    - name: Show token rotation result
      debug:
        msg: "Token rotated on {{ inventory_hostname }}. All nodes will be updated."
      when: token_rotated is changed

    # After rotation, update config + token file + restart on ALL nodes
    # (serial: 1 means this happens one node at a time)
    - name: Mark restart needed for token rotation
      set_fact:
        needs_restart: true
      when: do_rotate_token | bool

    # =============================================
    # PHASE 1: Fix config and tmpfs (always safe)
    # =============================================

    # --- Ensure config exists with correct token ---

    - name: Render k3s server config from template
      template:
        src: templates/k3s-server-config.yaml.j2
        dest: "{{ k3s_config_path }}"
        owner: root
        group: root
        mode: "0644"
      vars:
        k3s_token: "{{ k3s_token }}"
      register: config_rendered
      when: needs_config | bool

    # For existing configs, fix the token if it doesn't match
    - name: Extract password from provided token
      set_fact:
        token_password: "{{ k3s_token.split('::server:')[-1] if '::server:' in k3s_token else k3s_token }}"

    - name: Extract password from current config token
      set_fact:
        current_password: >-
          {{ current_config_token.stdout.split('::server:')[-1]
             if '::server:' in (current_config_token.stdout | default(''))
             else (current_config_token.stdout | default('')) }}
      when: k3s_config_exists.stat.exists

    - name: Fix token in existing config
      lineinfile:
        path: "{{ k3s_config_path }}"
        regexp: '^token:'
        line: 'token: "{{ k3s_token }}"'
      register: token_fixed
      when:
        - k3s_config_exists.stat.exists
        - current_password | default('') != token_password
        - not (needs_config | bool)

    # Ensure server: line exists (needed for all nodes to rejoin after tmpfs wipe)
    - name: Ensure server line exists for cluster rejoin
      lineinfile:
        path: "{{ k3s_config_path }}"
        regexp: '^server:'
        line: 'server: "https://{{ peer_ip }}:6443"'
        insertafter: '^# Cluster configuration|^cluster-cidr:'
      register: server_line_added
      when: is_first_controller | bool and k3s_config_exists.stat.exists

    # --- Ensure tmpfs is set up and correctly sized ---

    - name: Update fstab tmpfs entry
      lineinfile:
        path: /etc/fstab
        regexp: '^\s*tmpfs\s+{{ etcd_mount_dir }}'
        line: "tmpfs {{ etcd_mount_dir }} tmpfs nodev,nosuid,size={{ tmpfs_size }} 0 0"
        state: present

    - name: Create etcd mount point if missing
      file:
        path: "{{ etcd_mount_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      when: needs_tmpfs_mount | bool

    - name: Mount tmpfs (new mount)
      mount:
        path: "{{ etcd_mount_dir }}"
        src: tmpfs
        fstype: tmpfs
        opts: "nodev,nosuid,size={{ tmpfs_size }}"
        state: mounted
      when: needs_tmpfs_mount | bool

    # Resize tmpfs live if it's too small (remount preserves data)
    - name: Resize tmpfs to {{ tmpfs_size }}
      shell: mount -o remount,size={{ tmpfs_size }} {{ etcd_mount_dir }}
      register: tmpfs_resized
      when: needs_tmpfs_resize | bool

    - name: Show tmpfs resize result
      debug:
        msg: "Resized tmpfs from {{ current_tmpfs_size_mb.stdout }}M to {{ tmpfs_size }}"
      when: tmpfs_resized is changed

    # =============================================
    # PHASE 1b: Install etcdctl (needed for member management)
    # =============================================

    - name: Install etcdctl binary
      shell: |
        if [ -x {{ etcdctl_path }} ]; then
          echo "already present"
          exit 0
        fi
        ARCH=$(uname -m)
        case $ARCH in
          aarch64) ARCH=arm64 ;;
          x86_64) ARCH=amd64 ;;
        esac
        curl -sL "https://github.com/etcd-io/etcd/releases/download/{{ etcd_version }}/etcd-{{ etcd_version }}-linux-${ARCH}.tar.gz" \
          | tar xz --strip-components=1 -C /usr/local/bin "etcd-{{ etcd_version }}-linux-${ARCH}/etcdctl"
        chmod 755 {{ etcdctl_path }}
      register: etcdctl_install
      changed_when: "'already present' not in etcdctl_install.stdout"

    - name: Install etcdctl on peer node
      delegate_to: "{{ peer_node }}"
      shell: |
        if [ -x {{ etcdctl_path }} ]; then
          echo "already present"
          exit 0
        fi
        ARCH=$(uname -m)
        case $ARCH in
          aarch64) ARCH=arm64 ;;
          x86_64) ARCH=amd64 ;;
        esac
        curl -sL "https://github.com/etcd-io/etcd/releases/download/{{ etcd_version }}/etcd-{{ etcd_version }}-linux-${ARCH}.tar.gz" \
          | tar xz --strip-components=1 -C /usr/local/bin "etcd-{{ etcd_version }}-linux-${ARCH}/etcdctl"
        chmod 755 {{ etcdctl_path }}
      register: etcdctl_peer_install
      changed_when: "'already present' not in etcdctl_peer_install.stdout"

    # =============================================
    # PHASE 2: Force restore from snapshot
    # =============================================

    - name: Confirm force restore
      ansible.builtin.include_tasks: ../../tasks/confirm-destructive.yml
      vars:
        destructive_action: "wipe etcd and restore from snapshot on {{ inventory_hostname }}"
        skipped_checks: "cluster health gate (force restore wipes and rebuilds etcd)"
      when: do_force_restore | bool

    - name: Validate snapshot exists for force_restore
      assert:
        that: latest_snapshot.stdout | default('') | length > 0
        fail_msg: "No snapshots found in {{ snapshot_dir }} — cannot restore"
      when: do_force_restore | bool

    - name: "FORCE RESTORE: Stop k3s"
      systemd:
        name: k3s
        state: stopped
      when: do_force_restore | bool and k3s_state.stdout != 'inactive'

    - name: "FORCE RESTORE: Unmount tmpfs"
      shell: umount {{ etcd_mount_dir }} 2>/dev/null || true
      when: do_force_restore | bool

    - name: "FORCE RESTORE: Clean etcd data on SD card"
      shell: >-
        rm -rf {{ etcd_mount_dir }}/* {{ etcd_mount_dir }}-old-*
        {{ etcd_data_dir }}/etcd-tmp
        {{ etcd_data_dir }}/state.db {{ etcd_data_dir }}/state.db-wal {{ etcd_data_dir }}/state.db-shm
      when: do_force_restore | bool

    - name: "FORCE RESTORE: Comment out server line for cluster-reset"
      shell: sed -i 's/^server:/#FORCE_RESTORE#server:/' {{ k3s_config_path }}
      when: do_force_restore | bool

    - name: "FORCE RESTORE: Restore from snapshot {{ latest_snapshot.stdout | default('') | basename }}"
      shell: >-
        k3s server --cluster-reset
        --cluster-reset-restore-path={{ latest_snapshot.stdout }}
      when: do_force_restore | bool
      register: restore_result

    - name: "FORCE RESTORE: Re-enable server line"
      shell: sed -i 's/^#FORCE_RESTORE#server:/server:/' {{ k3s_config_path }}
      when: do_force_restore | bool

    - name: "FORCE RESTORE: Copy restored data into tmpfs"
      shell: |
        cp -a {{ etcd_mount_dir }} /tmp/etcd-restored
        mount {{ etcd_mount_dir }}
        cp -a /tmp/etcd-restored/. {{ etcd_mount_dir }}/
        rm -rf /tmp/etcd-restored
        rm -rf {{ etcd_mount_dir }}-old-* {{ etcd_data_dir }}/etcd-tmp
      when: do_force_restore | bool

    - name: "FORCE RESTORE: Update server token file"
      copy:
        content: "{{ k3s_token }}"
        dest: "{{ k3s_server_dir }}/token"
        owner: root
        group: root
        mode: "0600"
      when: do_force_restore | bool
      no_log: true

    - name: "FORCE RESTORE: Start k3s"
      systemd:
        name: k3s
        state: started
      when: do_force_restore | bool

    - name: "FORCE RESTORE: Wait for API"
      uri:
        url: "https://{{ ansible_host }}:6443/healthz"
        method: GET
        validate_certs: no
        status_code: [200, 401]
        timeout: 10
      register: restore_api_health
      until: restore_api_health.status in [200, 401]
      retries: 60
      delay: 10
      when: do_force_restore | bool

    - name: "FORCE RESTORE: Rotate token to match provided value"
      shell: >-
        k3s token rotate --new-token '{{ k3s_token }}'
      when: do_force_restore | bool
      no_log: true

    - name: Show force restore result
      debug:
        msg: |
          === FORCE RESTORE COMPLETE on {{ inventory_hostname }} ===
          Restored from: {{ latest_snapshot.stdout | default('') | basename }}
          API health: {{ restore_api_health.status | default('N/A') }}
          Token set to provided value.
          Now run this playbook WITHOUT force_restore on the other nodes.
      when: do_force_restore | bool

    # Skip remaining phases if force_restore was used
    - name: End play after force restore
      meta: end_host
      when: do_force_restore | bool

    # =============================================
    # PHASE 3: Fix token mismatch (requires restart)
    # =============================================

    - name: Mark restart needed if fixes were applied
      set_fact:
        needs_restart: true
      when: >-
        (not needs_restart | bool) and
        (token_fixed is changed or
        config_rendered is changed or
        server_line_added is changed or
        tmpfs_resized is changed)

    # Clean up etcd-tmp (created by failed reconciliation attempts)
    - name: Stop k3s before cleanup (if restarting)
      systemd:
        name: k3s
        state: stopped
      when: needs_restart | bool and k3s_state.stdout != 'inactive'

    - name: Remove stale etcd-tmp directory
      file:
        path: "{{ etcd_data_dir }}/etcd-tmp"
        state: absent
      when: needs_etcd_tmp_cleanup | bool

    - name: Remove stale kine state.db files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ etcd_data_dir }}/state.db"
        - "{{ etcd_data_dir }}/state.db-wal"
        - "{{ etcd_data_dir }}/state.db-shm"
      when: needs_restart | bool

    # Update the server token file to match
    - name: Update server token file
      copy:
        content: "{{ k3s_token }}"
        dest: "{{ k3s_server_dir }}/token"
        owner: root
        group: root
        mode: "0600"
      when:
        - needs_restart | bool
        - server_token_file.stdout | default('') != k3s_token
      no_log: true

    # =============================================
    # Stale etcd member cleanup (reboot recovery)
    # When tmpfs is empty and k3s is crash-looping with "duplicate node name",
    # we must: stop k3s, remove stale member + orphaned learners from peer,
    # wipe local etcd dir completely, then start k3s fresh.
    # =============================================

    - name: Stop and mask k3s to prevent restart during member cleanup
      shell: |
        systemctl stop k3s
        systemctl mask k3s
      when:
        - etcd_data_state.stdout == "empty"
        - k3s_crash_loop | bool or needs_restart | bool or k3s_state.stdout == 'inactive'

    - name: Get all etcd members from peer
      delegate_to: "{{ peer_node }}"
      shell: >-
        ETCDCTL_API=3 {{ etcdctl_path }} {{ etcd_certs }}
        member list -w simple 2>/dev/null || true
      register: etcd_member_list_raw
      when: etcd_data_state.stdout == "empty"

    - name: Extract stale member IDs (this node + orphaned learners)
      set_fact:
        stale_member_ids: >-
          {{ (etcd_member_list_raw.stdout_lines | default([]))
             | select('search', ansible_host)
             | map('regex_replace', ',.*', '')
             | list
             +
             (etcd_member_list_raw.stdout_lines | default([]))
             | select('regex', '^[^,]+,\s*\w+,\s*,')
             | map('regex_replace', ',.*', '')
             | list }}
      when: etcd_data_state.stdout == "empty"

    - name: Remove stale etcd members from peer
      delegate_to: "{{ peer_node }}"
      shell: >-
        ETCDCTL_API=3 {{ etcdctl_path }} {{ etcd_certs }}
        member remove {{ item }}
      loop: "{{ stale_member_ids | default([]) }}"
      when:
        - stale_member_ids | default([]) | length > 0
        - item | length > 0
      register: member_removal
      failed_when: false

    - name: Show member removal results
      debug:
        msg: "Removed etcd members from {{ peer_node }}: {{ stale_member_ids | default([]) }}"
      when: stale_member_ids | default([]) | length > 0

    - name: Wipe etcd data directory completely
      shell: rm -rf {{ etcd_mount_dir }}/*
      when: etcd_data_state.stdout == "empty"

    - name: Unmask k3s after member cleanup
      shell: systemctl unmask k3s
      when: etcd_data_state.stdout == "empty"

    - name: Start k3s after fixes
      systemd:
        name: k3s
        state: started
      when: needs_restart | bool

    # =============================================
    # PHASE 4: Handle stopped k3s (reboot recovery)
    # =============================================

    - name: Start k3s if not running (peer rejoin)
      systemd:
        name: k3s
        state: started
      when:
        - k3s_state.stdout == 'inactive' or k3s_crash_loop | bool
        - not (needs_restart | bool)
        - k3s_binary.stat.exists
        - k3s_config_exists.stat.exists or (config_rendered is changed)

    # =============================================
    # PHASE 5: Deploy auto-recovery (survives full power loss)
    # =============================================

    - name: Deploy auto-recovery script
      template:
        src: templates/k3s-etcd-autorecovery.sh.j2
        dest: /usr/local/bin/k3s-etcd-recovery.sh
        owner: root
        group: root
        mode: "0755"

    - name: Deploy auto-recovery systemd unit
      template:
        src: templates/k3s-etcd-recovery.service.j2
        dest: /etc/systemd/system/k3s-etcd-recovery.service
        owner: root
        group: root
        mode: "0644"
      register: recovery_unit

    - name: Ensure k3s service drop-in directory exists
      file:
        path: /etc/systemd/system/k3s.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Add k3s dependency on etcd recovery service
      copy:
        dest: /etc/systemd/system/k3s.service.d/etcd-recovery.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          After=k3s-etcd-recovery.service
          Requires=k3s-etcd-recovery.service
      register: k3s_dropin

    - name: Enable auto-recovery service
      systemd:
        name: k3s-etcd-recovery
        enabled: yes
        daemon_reload: "{{ recovery_unit is changed or k3s_dropin is changed }}"

    # =============================================
    # PHASE 6: Verify
    # =============================================

    - name: Wait for k3s API to respond
      uri:
        url: "https://{{ ansible_host }}:6443/healthz"
        method: GET
        validate_certs: no
        status_code: [200, 401]
        timeout: 10
      register: api_health
      until: api_health.status in [200, 401]
      retries: 60
      delay: 10
      when: k3s_binary.stat.exists

    - name: Show recovery result
      debug:
        msg: |
          === {{ inventory_hostname }} recovery complete ===
          API health:       {{ api_health.status | default('skipped') }}
          Config rendered:  {{ config_rendered is changed | default(false) }}
          Token fixed:      {{ token_fixed is changed | default(false) }}
          Token rotated:    {{ token_rotated is changed | default(false) }}
          tmpfs resized:    {{ tmpfs_resized is changed | default(false) }}
          Restarted:        {{ needs_restart }}
          Auto-recovery:    enabled
