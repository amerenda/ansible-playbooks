---
# Fetch secrets from Bitwarden Secrets Manager (BWS)
#
# Runs on the Ansible control node (localhost). Fetches all secrets defined
# in group_vars/k3s.yml (bws_secrets dict) and sets them as facts available
# to all subsequent plays.
#
# Usage:
#   ansible-playbook -i inventory/inventory.ini playbooks/infrastructure/fetch-secrets.yml \
#     -e bws_access_token=<TOKEN>
#
# Or as part of all.yml (first play):
#   ansible-playbook -i inventory/inventory.ini all.yml -e bws_access_token=<TOKEN>
#
# After this play runs, secrets are available as:
#   hostvars['localhost']['fetched_secrets']['k3s_token']
#   hostvars['localhost']['fetched_secrets']['argocd_repo_pat']
#   etc.
#
# Design decisions:
#   - Runs on localhost only — no bws CLI needed on remote nodes
#   - Skips secrets with empty UUIDs (not yet created in BWS)
#   - Fails fast if bws_access_token is missing
#   - Installs bws CLI automatically if not present

- name: Fetch secrets from Bitwarden Secrets Manager
  hosts: localhost
  connection: local
  gather_facts: true
  tags: [secrets, bws]

  vars:
    bws_version: "2.0.0"
    bws_install_path: /usr/local/bin/bws
  vars_files:
    - ../../group_vars/k3s.yml

  pre_tasks:
    - name: Validate bws_access_token is provided
      ansible.builtin.assert:
        that:
          - bws_access_token is defined
          - bws_access_token | length > 0
        fail_msg: |
          bws_access_token is required. Run with:
            -e bws_access_token=<YOUR_BWS_TOKEN>

    - name: Validate bws_secrets is defined
      ansible.builtin.assert:
        that:
          - bws_secrets is defined
          - bws_secrets | length > 0
        fail_msg: |
          bws_secrets dict not found. Ensure group_vars/k3s.yml is loaded.
          Check that [k3s:children] exists in inventory and includes the target hosts.

  tasks:
    # --- Find or install bws CLI ---

    - name: Find bws CLI on PATH
      ansible.builtin.command: which bws
      register: bws_which
      changed_when: false
      failed_when: false

    - name: Set bws_bin from PATH or install path
      ansible.builtin.set_fact:
        bws_bin: "{{ bws_which.stdout if bws_which.rc == 0 else bws_install_path }}"

    - name: Check installed bws version
      ansible.builtin.command: "{{ bws_bin }} --version"
      register: bws_installed_version
      changed_when: false
      when: bws_which.rc == 0

    - name: Install bws CLI
      when: bws_which.rc != 0
      block:
        - name: Determine platform
          ansible.builtin.set_fact:
            bws_platform: >-
              {{ 'x86_64-unknown-linux-gnu' if ansible_system == 'Linux' and ansible_architecture == 'x86_64'
                 else 'aarch64-unknown-linux-gnu' if ansible_system == 'Linux' and ansible_architecture == 'aarch64'
                 else 'aarch64-apple-darwin' if ansible_system == 'Darwin' and ansible_architecture == 'arm64'
                 else 'x86_64-apple-darwin' if ansible_system == 'Darwin' and ansible_architecture == 'x86_64'
                 else 'unsupported' }}

        - name: Fail on unsupported platform
          ansible.builtin.fail:
            msg: "Unsupported platform: {{ ansible_system }} {{ ansible_architecture }}"
          when: bws_platform == 'unsupported'

        - name: Download and install bws CLI
          ansible.builtin.shell: |
            set -euo pipefail
            URL="https://github.com/bitwarden/sdk-sm/releases/download/bws-v{{ bws_version }}/bws-{{ bws_platform }}-{{ bws_version }}.zip"
            curl -sL "$URL" -o /tmp/bws.zip
            unzip -o /tmp/bws.zip -d /tmp/bws-extract
            sudo mv /tmp/bws-extract/bws {{ bws_install_path }}
            sudo chmod +x {{ bws_install_path }}
            rm -rf /tmp/bws.zip /tmp/bws-extract
            {{ bws_install_path }} --version
          args:
            executable: /bin/bash
          register: bws_install

        - name: Show installed version
          ansible.builtin.debug:
            msg: "Installed bws CLI: {{ bws_install.stdout }}"

    # --- Fetch secrets ---

    - name: Identify secrets to fetch (skip empty UUIDs)
      ansible.builtin.set_fact:
        secrets_to_fetch: >-
          {{ bws_secrets | dict2items | selectattr('value', 'ne', '') | list }}
        secrets_skipped: >-
          {{ bws_secrets | dict2items | selectattr('value', 'eq', '') | map(attribute='key') | list }}

    - name: Show secrets that will be skipped (no UUID)
      ansible.builtin.debug:
        msg: "Skipping secrets with empty UUIDs: {{ secrets_skipped | join(', ') }}"
      when: secrets_skipped | length > 0

    - name: Fetch each secret from BWS
      ansible.builtin.command: >-
        {{ bws_bin }} secret get {{ item.value }}
        --access-token {{ bws_access_token }}
        --output json
      loop: "{{ secrets_to_fetch }}"
      loop_control:
        label: "{{ item.key }}"
      register: bws_results
      no_log: true
      changed_when: false

    - name: Parse fetched secrets into dict
      ansible.builtin.set_fact:
        fetched_secrets: >-
          {{ fetched_secrets | default({}) | combine({
               item.item.key: (item.stdout | from_json).value
             }) }}
      loop: "{{ bws_results.results }}"
      loop_control:
        label: "{{ item.item.key }}"
      no_log: true

    - name: Show fetched secret names (not values)
      ansible.builtin.debug:
        msg: >-
          Fetched {{ fetched_secrets | length }} secrets: {{ fetched_secrets.keys() | list | join(', ') }}.
          Skipped {{ secrets_skipped | length }}: {{ secrets_skipped | join(', ') | default('none') }}

    # --- Convenience aliases ---
    # Set commonly-used secrets as top-level facts so playbooks can
    # reference them directly instead of fetched_secrets['k3s_token']

    - name: Set k3s_token fact
      ansible.builtin.set_fact:
        k3s_token: "{{ fetched_secrets.k3s_token }}"
      when: "'k3s_token' in fetched_secrets"
      no_log: true
