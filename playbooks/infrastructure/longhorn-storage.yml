---
# Longhorn Storage Node Configuration
#
# Installs prereqs (packages, kernel modules, iSCSI) on all nodes that
# participate in Longhorn, then configures Longhorn node scheduling.
#
# Usage:
#   ansible-playbook -i inventory/inventory.ini playbooks/infrastructure/longhorn-storage.yml
#
#   # Single node:
#   ansible-playbook -i inventory/inventory.ini playbooks/infrastructure/longhorn-storage.yml --limit rpi5-0

- name: Install Longhorn prerequisites
  hosts: longhorn_nodes
  become: yes
  gather_facts: yes
  tags: [longhorn, prereqs]

  vars:
    longhorn_packages_debian:
      - nfs-common
      - open-iscsi
      - cryptsetup
      - dmsetup
    longhorn_packages_arch:
      - nfs-utils
      - open-iscsi
      - cryptsetup
      - device-mapper

    kernel_modules:
      - nfs
      - iscsi_tcp
      - dm_crypt

  pre_tasks:
    - name: Check if k3s is installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_installed

    - name: Fail if k3s is not installed
      fail:
        msg: "k3s is not installed on {{ inventory_hostname }}."
      when: not k3s_installed.stat.exists

  tasks:
    - name: Install Longhorn packages (Debian / Raspberry Pi OS)
      ansible.builtin.apt:
        name: "{{ longhorn_packages_debian }}"
        state: present
        update_cache: yes
      when: ansible_os_family == 'Debian'

    - name: Install Longhorn packages (Arch Linux)
      community.general.pacman:
        name: "{{ longhorn_packages_arch }}"
        state: present
      when: ansible_distribution == 'Archlinux'

    - name: Fail if OS has no Longhorn package mapping
      ansible.builtin.fail:
        msg: >-
          longhorn-storage.yml: add packages for {{ ansible_distribution }}
          (family {{ ansible_os_family }})
      when: ansible_os_family != 'Debian' and ansible_distribution != 'Archlinux'

    - name: Enable and start iscsid
      ansible.builtin.systemd:
        name: iscsid
        enabled: yes
        state: started

    - name: Add kernel modules to /etc/modules (Debian family)
      ansible.builtin.lineinfile:
        path: /etc/modules
        line: "{{ item }}"
        create: yes
        mode: '0644'
      loop: "{{ kernel_modules }}"
      when: ansible_os_family == 'Debian'

    - name: Persist kernel modules (Arch Linux)
      ansible.builtin.copy:
        dest: /etc/modules-load.d/longhorn.conf
        mode: '0644'
        content: |
          {{ kernel_modules | join('\n') }}

      when: ansible_distribution == 'Archlinux'

    - name: Load kernel modules
      community.general.modprobe:
        name: "{{ item }}"
      loop: "{{ kernel_modules }}"

    - name: Require /mnt/storage mounted for archlinux Longhorn path
      ansible.builtin.command: mountpoint -q /mnt/storage
      changed_when: false
      when:
        - inventory_hostname in (groups['archlinux_k3s'] | default([]))
        - longhorn_host_disk_path is defined
        - longhorn_host_disk_path is search('^/mnt/storage')

    - name: Ensure Longhorn data directory on archlinux
      ansible.builtin.file:
        path: "{{ longhorn_host_disk_path }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when:
        - inventory_hostname in (groups['archlinux_k3s'] | default([]))
        - longhorn_host_disk_path is defined

    - name: Verify prerequisites (Debian)
      ansible.builtin.shell: |
        echo "=== Packages ==="
        dpkg -l | grep -E 'nfs-common|open-iscsi|cryptsetup|dmsetup' | awk '{print $2, $3}'
        echo "=== Kernel modules ==="
        for m in nfs iscsi_tcp dm_crypt; do
          lsmod | grep -q $m && echo "$m: loaded" || echo "$m: NOT loaded"
        done
        echo "=== iscsid ==="
        systemctl is-active iscsid
      register: prereq_check_debian
      changed_when: false
      when: ansible_os_family == 'Debian'

    - name: Verify prerequisites (Arch Linux)
      ansible.builtin.shell: |
        echo "=== Packages ==="
        pacman -Q nfs-utils open-iscsi cryptsetup device-mapper
        echo "=== Kernel modules ==="
        for m in nfs iscsi_tcp dm_crypt; do
          lsmod | grep -q $m && echo "$m: loaded" || echo "$m: NOT loaded"
        done
        echo "=== iscsid ==="
        systemctl is-active iscsid
      register: prereq_check_arch
      changed_when: false
      when: ansible_distribution == 'Archlinux'

    - name: Show prereq status (Debian)
      ansible.builtin.debug:
        msg: "{{ prereq_check_debian.stdout }}"
      when: ansible_os_family == 'Debian'

    - name: Show prereq status (Arch Linux)
      ansible.builtin.debug:
        msg: "{{ prereq_check_arch.stdout }}"
      when: ansible_distribution == 'Archlinux'

- name: Configure Longhorn node scheduling
  hosts: "{{ groups['controllers'][0] }}"
  become: yes
  gather_facts: no
  tags: [longhorn, scheduling]

  vars:
    # Nodes where Longhorn should schedule replicas
    longhorn_scheduling:
      rpi3-0: true
      rpi4-0: false
      rpi5-0: true
      rpi5-1: true
      murderbot: false
      archlinux: true

  tasks:
    - name: Configure Longhorn node scheduling
      shell: >-
        kubectl -n default patch nodes.longhorn.io/{{ item.key }}
        --type merge -p '{"spec":{"allowScheduling":{{ item.value | lower }}}}'
      loop: "{{ longhorn_scheduling | dict2items }}"
      loop_control:
        label: "{{ item.key }}: allowScheduling={{ item.value }}"
      register: scheduling_result
      changed_when: "'no change' not in (scheduling_result.stdout | default(''))"
      failed_when: false

    - name: Show Longhorn node status
      shell: >-
        kubectl get nodes.longhorn.io -n default
        -o custom-columns=NAME:.metadata.name,SCHEDULING:.spec.allowScheduling,READY:.status.conditions[0].status
      register: node_status
      changed_when: false

    - name: Longhorn node status
      debug:
        msg: "{{ node_status.stdout }}"
