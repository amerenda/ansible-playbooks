# Komodo Periphery for the murderbot host (Debian).
# Bundled for Ansible when murderbot/komodo/ is not yet on origin/main.
# Self-managed (komodo.skip): not deployed by Komodo ResourceSync.
#
# name: sets the Compose project name (`docker compose ls`), not the container name.

name: murderbot-periphery

services:
  periphery:
    build:
      context: .
      dockerfile: Dockerfile.periphery
    container_name: komodo-periphery
    labels:
      komodo.skip:
    restart: unless-stopped
    ports:
      - "8120:8120"
    env_file: ./compose.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - /etc/komodo:/etc/komodo
      - /etc/komodo/.bws-secret:/run/secrets/bws-access-token:ro
      - /mnt/storage/media/config:/mnt/storage/media/config
      - /mnt/storage:/mnt/storage
