---
# Bootstrap the Arch Linux host as a Komodo Periphery agent for
# amerenda/komodo-dean-gitops. After this play, Komodo Core (mac-mini-m4)
# can deploy stacks under `archlinux/` to this host (e.g. media-server).
#
# Periphery passkey: `tasks/archlinux-komodo-render-compose-env.yml` is
# included on every run. It writes PERIPHERY_PASSKEYS from BWS
# (komodo-dean-passkey) and strips leading/trailing whitespace so Core and
# Periphery agree (avoids "Invalid passkey" when the secret has stray newlines).
#
# Re-running this playbook refreshes `compose.env` and **force-recreates** the
# Periphery container so env changes always apply (troubleshooting Komodo).
#
# Run (first bootstrap needs a token; re-runs can omit it if /etc/komodo/.bws-secret exists):
#   ansible-playbook -i inventory/inventory.ini \
#     playbooks/infrastructure/setup-archlinux-komodo.yml \
#     --extra-vars "bws_access_token=<YOUR_BWS_TOKEN>"
#
# Tags: arch-komodo, arch-bws, arch-periphery, arch-media-dirs

- name: Bootstrap Komodo Periphery on archlinux
  hosts: archlinux_komodo_hosts
  gather_facts: yes
  become: yes
  vars_files:
    - ../../group_vars/archlinux_komodo_hosts.yml
  vars:
    target_user: "{{ ansible_user }}"
    compose_dir: "/home/{{ target_user }}/komodo-dean-gitops"
    archlinux_compose_dir: "{{ compose_dir }}/archlinux"
    komodo_dir: "{{ archlinux_compose_dir }}/komodo"
    komodo_etc: "/etc/komodo"
    bws_token_file: "{{ komodo_etc }}/.bws-secret"

  pre_tasks:
    - name: Stat existing BWS token on host
      ansible.builtin.stat:
        path: "{{ bws_token_file }}"
      register: bws_secret_stat

    - name: Fail if no BWS token on host and none passed in
      ansible.builtin.fail:
        msg: |
          For first bootstrap, pass --extra-vars "bws_access_token=<TOKEN>".
          To re-run without passing the token, ensure {{ bws_token_file }} exists
          (from a previous bootstrap).
      when:
        - not bws_secret_stat.stat.exists
        - bws_access_token is not defined or (bws_access_token | default('') | length) == 0

  tasks:
    # ─── System packages ───────────────────────────────────────────────────
    - name: Install host packages (Docker, jq, git, curl, unzip)
      pacman:
        name:
          - docker
          - docker-compose
          - jq
          - git
          - curl
          - unzip
        state: present
        update_cache: yes
      tags: [arch-komodo, arch-periphery]

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started
      tags: [arch-komodo, arch-periphery]

    - name: Add target user to docker group
      user:
        name: "{{ target_user }}"
        groups: docker
        append: yes
      tags: [arch-komodo, arch-periphery]

    # ─── bws CLI on host (also used to render compose.env) ─────────────────
    - name: Detect host architecture for bws CLI
      set_fact:
        bws_target: "{{ 'aarch64-unknown-linux-gnu' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'x86_64-unknown-linux-gnu' }}"
      tags: [arch-komodo, arch-bws]

    - name: Check if bws CLI is already installed
      stat:
        path: /usr/local/bin/bws
      register: bws_check
      tags: [arch-komodo, arch-bws]

    - name: Install bws CLI
      unarchive:
        src: "https://github.com/bitwarden/sdk-sm/releases/download/bws-v{{ bws_version }}/bws-{{ bws_target }}-{{ bws_version }}.zip"
        dest: /usr/local/bin/
        remote_src: yes
        mode: "0755"
      when: not bws_check.stat.exists
      tags: [arch-komodo, arch-bws]

    # ─── BWS access token on disk ──────────────────────────────────────────
    - name: Ensure /etc/komodo exists
      file:
        path: "{{ komodo_etc }}"
        state: directory
        mode: "0755"
      tags: [arch-komodo, arch-bws, arch-periphery]

    - name: Write BWS access token (mode 0600)
      ansible.builtin.copy:
        content: "{{ bws_access_token }}"
        dest: "{{ bws_token_file }}"
        mode: "0600"
        owner: root
        group: root
      no_log: true
      when: bws_access_token is defined and (bws_access_token | length) > 0
      tags: [arch-komodo, arch-bws, arch-periphery]

    # ─── komodo-dean-gitops checkout ──────────────────────────────────────
    - name: Check if komodo-dean-gitops repo exists
      stat:
        path: "{{ compose_dir }}/.git"
      register: compose_repo_check
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    - name: Clone komodo-dean-gitops
      git:
        repo: "{{ compose_repo }}"
        dest: "{{ compose_dir }}"
        version: main
      become: no
      when: not compose_repo_check.stat.exists
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    - name: Pull latest komodo-dean-gitops
      shell: "git -C {{ compose_dir }} pull --ff-only"
      become: no
      changed_when: false
      when: compose_repo_check.stat.exists
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    # If origin/main does not yet contain archlinux/komodo/, the path is missing
    # after clone. copy: will not create parent dirs — create them explicitly.
    # become: false so new dirs under ~ are owned by the login user (not root).
    - name: Ensure archlinux/komodo directory exists
      ansible.builtin.file:
        path: "{{ komodo_dir }}"
        state: directory
        mode: "0755"
      become: false
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    # If compose.env.example is still missing (stale main), seed from the copy
    # bundled with this playbook only when absent (force: no).
    - name: Ensure archlinux/komodo/compose.env.example exists
      ansible.builtin.copy:
        src: archlinux-komodo-compose.env.example
        dest: "{{ komodo_dir }}/compose.env.example"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        force: false
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    # docker compose requires compose.yaml (or docker-compose.yml) in chdir;
    # seed from playbook when repo main does not yet include archlinux/komodo/.
    - name: Ensure archlinux/komodo/compose.yaml exists
      ansible.builtin.copy:
        src: archlinux-komodo-compose.yaml
        dest: "{{ komodo_dir }}/compose.yaml"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        force: false
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    - name: Ensure archlinux/komodo/Dockerfile.periphery exists
      ansible.builtin.copy:
        src: archlinux-komodo-Dockerfile.periphery
        dest: "{{ komodo_dir }}/Dockerfile.periphery"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        force: false
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    # ─── Render Periphery compose.env from BWS ─────────────────────────────
    # Do not use sed for passkey injection: Komodo passkeys often contain
    # characters that break sed. Python str.replace is safe. Passkey is
    # stripped of leading/trailing whitespace after BWS decode (avoids Core vs
    # Periphery mismatch when the secret has a trailing newline).
    - name: Render archlinux/komodo/compose.env from compose.env.example
      ansible.builtin.include_tasks: ../../tasks/archlinux-komodo-render-compose-env.yml
      tags: [arch-komodo, arch-periphery]

    # ─── Deploy Periphery ──────────────────────────────────────────────────
    - name: Build and (re)start Komodo Periphery (force-recreate for env/passkey fixes)
      ansible.builtin.shell: docker compose -f compose.yaml --env-file compose.env up -d --build --force-recreate
      args:
        chdir: "{{ komodo_dir }}"
      changed_when: true
      tags: [arch-komodo, arch-periphery]

    - name: Wait for Periphery to listen on :8120
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8120
        timeout: 90
      tags: [arch-komodo, arch-periphery]

    # ─── Media-server host directories ─────────────────────────────────────
    - name: Pre-create media-server config dirs (owner 1000:1000)
      file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"
      loop:
        - "{{ media_config_root }}"
        - "{{ media_config_root }}/profilarr/config"
        - "{{ media_config_root }}/whisparr/config"
        - "{{ media_config_root }}/radarr/config"
        - "{{ media_config_root }}/bazarr/config"
        - "{{ media_config_root }}/sonarr/config"
        - "{{ media_config_root }}/sonarr/scripts"
        - "{{ media_config_root }}/prowlarr/config"
        - "{{ media_config_root }}/sabnzbd/config"
        - "{{ media_config_root }}/jellyfin/config"
      tags: [arch-komodo, arch-media-dirs]

    - name: Verify /mnt/storage is mounted (out-of-band setup required)
      shell: mountpoint -q "{{ media_data_root }}"
      register: storage_mount
      changed_when: false
      failed_when: false
      tags: [arch-komodo, arch-media-dirs]

    - name: Warn if /mnt/storage is not mounted
      debug:
        msg: |
          {{ media_data_root }} is not a mountpoint. The media-server stack
          assumes a real disk is mounted there. Set this up out of band
          (parted/mkfs/fstab) before deploying the media-server stack.
      when: storage_mount.rc != 0
      tags: [arch-komodo, arch-media-dirs]

    - name: Pre-create media-server data dirs (owner 1000:1000)
      file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"
      loop:
        - "{{ media_data_root }}/movies"
        - "{{ media_data_root }}/tv"
        - "{{ media_data_root }}/books"
        - "{{ media_data_root }}/downloads"
        - "{{ media_data_root }}/downloads/complete"
        - "{{ media_data_root }}/downloads/incomplete"
        - "{{ media_data_root }}/cache"
        - "{{ media_data_root }}/cache/transcode"
      when: storage_mount.rc == 0
      tags: [arch-komodo, arch-media-dirs]

    # ─── Summary ───────────────────────────────────────────────────────────
    - name: Show summary
      debug:
        msg: |
          Komodo Periphery is up on https://{{ archlinux_ip }}:8120

          If Core still shows "Invalid passkey", the Komodo Variable used for
          the archlinux server (e.g. [[KOMODO_PERIPHERY_PASSKEY]]) must match
          BWS komodo-dean-passkey exactly — this playbook only fixes Periphery's side.

          Next steps (manual, in the Komodo UI on mac-mini-m4 — or via the
          [[server]] block in resource-sync/stacks.toml once it's added):
            1. Add a Komodo Server resource named "archlinux" pointing at
               https://{{ archlinux_ip }}:8120, passkey komodo-dean-passkey.
            2. Once visible/healthy, push a media-server stack to the gitops
               repo (archlinux/media-server/) and ResourceSync will register it.
