---
# Bootstrap the Arch Linux host as a Komodo Periphery agent for
# amerenda/komodo-dean-gitops. After this play, Komodo Core (mac-mini-m4)
# can deploy stacks under `murderbot/` from this host (e.g. media-server).
#
# Periphery passkey: `tasks/archlinux-komodo-render-compose-env.yml` is
# included on every run. It writes PERIPHERY_PASSKEYS from BWS
# (komodo-dean-passkey) and strips leading/trailing whitespace so Core and
# Periphery agree (avoids "Invalid passkey" when the secret has stray newlines).
#
# Re-running this playbook refreshes `compose.env` and **force-recreates** the
# Periphery container so env changes always apply (troubleshooting Komodo).
#
# Run (first bootstrap needs a token; re-runs can omit it if /etc/komodo/.bws-secret exists):
#   ansible-playbook -i inventory/inventory.ini \
#     playbooks/infrastructure/setup-archlinux-komodo.yml \
#     --extra-vars "bws_access_token=<YOUR_BWS_TOKEN>"
#
# Local laptop (Ansible on the same machine): put the host in archlinux_komodo_hosts
# with ansible_connection=local, real LAN ansible_host, and archlinux_ip on the
# inventory line (or inventory/host_vars). See README.
#
# Tags: arch-komodo, arch-bws, arch-periphery, arch-media-dirs

- name: Bootstrap Komodo Periphery on archlinux
  hosts: archlinux_komodo_hosts
  gather_facts: yes
  become: yes
  vars:
    target_user: "{{ ansible_user }}"
    compose_dir: "/home/{{ target_user }}/komodo-dean-gitops"
    murderbot_repo_dir: "{{ compose_dir }}/murderbot"
    komodo_dir: "{{ murderbot_repo_dir }}/komodo"
    komodo_etc: "/etc/komodo"
    bws_token_file: "{{ komodo_etc }}/.bws-secret"
    bws_token_dir: "{{ komodo_etc }}/secrets"
    bws_token_durable_file: "{{ bws_token_dir }}/bws-access-token"
    aur_build_dir: "/home/{{ target_user }}/.cache/ansible-aur"
    komodo_periphery_service_name: "komodo-periphery"
    komodo_periphery_port: 8120

  pre_tasks:
    - name: Stat existing BWS token on host (legacy path)
      ansible.builtin.stat:
        path: "{{ bws_token_file }}"
      register: bws_secret_stat

    - name: Stat existing BWS token on host (durable path)
      ansible.builtin.stat:
        path: "{{ bws_token_durable_file }}"
      register: bws_secret_durable_stat

    - name: Fail if no BWS token on host and none passed in
      ansible.builtin.fail:
        msg: |
          For first bootstrap, pass --extra-vars "bws_access_token=<TOKEN>".
          To re-run without passing the token, ensure {{ bws_token_file }} exists
          (from a previous bootstrap).
      when:
        - not bws_secret_stat.stat.exists
        - not bws_secret_durable_stat.stat.exists
        - bws_access_token is not defined or (bws_access_token | default('') | length) == 0

  tasks:
    - name: Resolve media path defaults
      ansible.builtin.set_fact:
        media_config_root_effective: "{{ lookup('vars', 'media_config_root', default='/mnt/storage/media/config') }}"
        media_data_root_effective: "{{ lookup('vars', 'media_data_root', default='/mnt/storage') }}"
      tags: [arch-komodo, arch-media-dirs]

    # ─── System packages ───────────────────────────────────────────────────
    - name: Install workstation packages from official repos
      pacman:
        name: "{{ archlinux_workstation_pacman_packages }}"
        state: present
        update_cache: yes
      tags: [arch-komodo, arch-periphery]

    - name: Enable and start configured workstation services
      systemd:
        name: "{{ item }}"
        enabled: yes
        state: started
      loop: "{{ archlinux_workstation_enable_services }}"
      tags: [arch-komodo, arch-periphery]

    - name: Add target user to docker group
      user:
        name: "{{ target_user }}"
        groups: docker
        append: yes
      tags: [arch-komodo, arch-periphery]

    - name: Align docker group GID for ARC runners (archlinux k3s agent)
      ansible.builtin.import_tasks: ../../tasks/archlinux-arc-docker-gid.yml
      when: inventory_hostname in (groups['archlinux_k3s'] | default([]))
      tags: [arch-komodo, arch-periphery, arch-arc-docker]

    # Docker Compose `gpus: all` for llm-agent/Ollama needs the NVIDIA Container Toolkit.
    - name: Detect NVIDIA driver (skip toolkit on GPU-less hosts)
      ansible.builtin.command: nvidia-smi -L
      register: archlinux_nvidia_smi
      changed_when: false
      failed_when: false
      tags: [arch-komodo, arch-periphery, arch-nvidia-docker]

    - name: Install NVIDIA Container Toolkit (pacman)
      pacman:
        name: nvidia-container-toolkit
        state: present
      when: archlinux_nvidia_smi.rc == 0
      tags: [arch-komodo, arch-periphery, arch-nvidia-docker]

    - name: Capture Docker daemon.json before NVIDIA runtime registration
      ansible.builtin.stat:
        path: /etc/docker/daemon.json
      register: archlinux_daemon_json_pre
      when: archlinux_nvidia_smi.rc == 0
      tags: [arch-komodo, arch-periphery, arch-nvidia-docker]

    - name: Register NVIDIA runtime with Docker
      ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
      when: archlinux_nvidia_smi.rc == 0
      changed_when: false
      tags: [arch-komodo, arch-periphery, arch-nvidia-docker]

    - name: Capture Docker daemon.json after NVIDIA runtime registration
      ansible.builtin.stat:
        path: /etc/docker/daemon.json
      register: archlinux_daemon_json_post
      when: archlinux_nvidia_smi.rc == 0
      tags: [arch-komodo, arch-periphery, arch-nvidia-docker]

    - name: Restart Docker when NVIDIA runtime changed daemon.json
      systemd:
        name: docker
        state: restarted
      when:
        - archlinux_nvidia_smi.rc == 0
        - (archlinux_daemon_json_post.stat.checksum | default('')) != (archlinux_daemon_json_pre.stat.checksum | default(''))
      tags: [arch-komodo, arch-periphery, arch-nvidia-docker]

    - name: Check if yay is already installed
      ansible.builtin.command: bash -lc "command -v yay"
      register: yay_check
      changed_when: false
      failed_when: false
      become: false
      tags: [arch-komodo, arch-periphery]

    - name: Ensure AUR build directory exists
      ansible.builtin.file:
        path: "{{ aur_build_dir }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"
      when: yay_check.rc != 0
      tags: [arch-komodo, arch-periphery]

    - name: Clone yay AUR helper
      ansible.builtin.git:
        repo: https://aur.archlinux.org/yay.git
        dest: "{{ aur_build_dir }}/yay"
        update: yes
      become: false
      when: yay_check.rc != 0
      tags: [arch-komodo, arch-periphery]

    - name: Build and install yay
      ansible.builtin.shell: |
        set -euo pipefail
        makepkg -si --noconfirm --needed
      args:
        chdir: "{{ aur_build_dir }}/yay"
        executable: /bin/bash
      become: false
      when: yay_check.rc != 0
      tags: [arch-komodo, arch-periphery]

    - name: Install workstation packages from AUR
      ansible.builtin.shell: |
        set -euo pipefail
        yay -S --noconfirm --needed {{ archlinux_workstation_aur_packages | join(' ') }}
      args:
        executable: /bin/bash
      become: false
      when: archlinux_workstation_aur_packages | length > 0
      tags: [arch-komodo, arch-periphery]

    # ─── bws CLI on host (also used to render compose.env) ─────────────────
    - name: Detect host architecture for bws CLI
      set_fact:
        bws_target: "{{ 'aarch64-unknown-linux-gnu' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'x86_64-unknown-linux-gnu' }}"
      tags: [arch-komodo, arch-bws]

    - name: Check if bws CLI is already installed
      stat:
        path: /usr/local/bin/bws
      register: bws_check
      tags: [arch-komodo, arch-bws]

    - name: Install bws CLI
      unarchive:
        src: "https://github.com/bitwarden/sdk-sm/releases/download/bws-v{{ bws_version }}/bws-{{ bws_target }}-{{ bws_version }}.zip"
        dest: /usr/local/bin/
        remote_src: yes
        mode: "0755"
      when: not bws_check.stat.exists
      tags: [arch-komodo, arch-bws]

    # ─── BWS access token on disk ──────────────────────────────────────────
    - name: Ensure /etc/komodo exists
      file:
        path: "{{ komodo_etc }}"
        state: directory
        mode: "0755"
      tags: [arch-komodo, arch-bws, arch-periphery]

    - name: Ensure /etc/komodo/secrets exists
      file:
        path: "{{ bws_token_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      tags: [arch-komodo, arch-bws, arch-periphery]

    - name: Write BWS access token (mode 0600)
      ansible.builtin.copy:
        content: "{{ bws_access_token }}"
        dest: "{{ bws_token_file }}"
        mode: "0600"
        owner: root
        group: root
      no_log: true
      when: bws_access_token is defined and (bws_access_token | length) > 0
      tags: [arch-komodo, arch-bws, arch-periphery]

    - name: Seed legacy token from durable file when token var not provided
      ansible.builtin.copy:
        remote_src: true
        src: "{{ bws_token_durable_file }}"
        dest: "{{ bws_token_file }}"
        owner: root
        group: root
        mode: "0600"
      when:
        - (bws_access_token is not defined or (bws_access_token | default('') | length) == 0)
        - bws_secret_durable_stat.stat.exists
      tags: [arch-komodo, arch-bws, arch-periphery]

    - name: Resolve BWS token secret UUID for durable host token
      ansible.builtin.set_fact:
        komodo_bws_access_token_ro_bws_uuid_effective: "{{ lookup('vars', 'komodo_bws_access_token_ro_bws_uuid', default='') }}"
      tags: [arch-komodo, arch-bws, arch-periphery]

    - name: Fetch durable BWS token from Bitwarden
      ansible.builtin.shell: |
        set -euo pipefail
        /usr/local/bin/bws secret get "{{ komodo_bws_access_token_ro_bws_uuid_effective }}" \
          --access-token "$(cat '{{ bws_token_file }}')" | jq -r .value | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
      args:
        executable: /bin/bash
      register: komodo_bws_durable_token
      changed_when: false
      no_log: true
      when: komodo_bws_access_token_ro_bws_uuid_effective | length > 0
      tags: [arch-komodo, arch-bws, arch-periphery]

    - name: Write durable BWS token file from Bitwarden secret
      ansible.builtin.copy:
        content: "{{ komodo_bws_durable_token.stdout }}"
        dest: "{{ bws_token_durable_file }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true
      when:
        - komodo_bws_access_token_ro_bws_uuid_effective | length > 0
        - (komodo_bws_durable_token.stdout | default('') | length) > 0
      tags: [arch-komodo, arch-bws, arch-periphery]

    - name: Keep legacy BWS token file synced from durable token
      ansible.builtin.copy:
        remote_src: true
        src: "{{ bws_token_durable_file }}"
        dest: "{{ bws_token_file }}"
        owner: root
        group: root
        mode: "0600"
      when:
        - komodo_bws_access_token_ro_bws_uuid_effective | length > 0
        - (komodo_bws_durable_token.stdout | default('') | length) > 0
      tags: [arch-komodo, arch-bws, arch-periphery]

    # ─── komodo-dean-gitops checkout ──────────────────────────────────────
    - name: Check if komodo-dean-gitops repo exists
      stat:
        path: "{{ compose_dir }}/.git"
      register: compose_repo_check
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    - name: Clone komodo-dean-gitops
      git:
        repo: "{{ compose_repo }}"
        dest: "{{ compose_dir }}"
        version: main
      become: no
      when: not compose_repo_check.stat.exists
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    - name: Pull latest komodo-dean-gitops
      shell: "git -C {{ compose_dir }} pull --ff-only"
      become: no
      changed_when: false
      when: compose_repo_check.stat.exists
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    # If origin/main does not yet contain murderbot/komodo/, the path is missing
    # after clone. copy: will not create parent dirs — create them explicitly.
    # become: false so new dirs under ~ are owned by the login user (not root).
    - name: Ensure murderbot/komodo directory exists
      ansible.builtin.file:
        path: "{{ komodo_dir }}"
        state: directory
        mode: "0755"
      become: false
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    # If compose.env.example is still missing (stale main), seed from the copy
    # bundled with this playbook only when absent (force: no).
    - name: Ensure murderbot/komodo/compose.env.example exists
      ansible.builtin.copy:
        src: archlinux-komodo-compose.env.example
        dest: "{{ komodo_dir }}/compose.env.example"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        force: false
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    # docker compose requires compose.yaml (or docker-compose.yml) in chdir;
    # seed from playbook when repo main does not yet include murderbot/komodo/.
    - name: Ensure murderbot/komodo/compose.yaml exists
      ansible.builtin.copy:
        src: archlinux-komodo-compose.yaml
        dest: "{{ komodo_dir }}/compose.yaml"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        force: false
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    - name: Ensure murderbot/komodo/Dockerfile.periphery exists
      ansible.builtin.copy:
        src: archlinux-komodo-Dockerfile.periphery
        dest: "{{ komodo_dir }}/Dockerfile.periphery"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        force: false
      tags: [arch-komodo, arch-periphery, arch-media-dirs]

    # ─── Render Periphery compose.env from BWS ─────────────────────────────
    # Do not use sed for passkey injection: Komodo passkeys often contain
    # characters that break sed. Python str.replace is safe. Passkey is
    # stripped of leading/trailing whitespace after BWS decode (avoids Core vs
    # Periphery mismatch when the secret has a trailing newline).
    - name: Render murderbot/komodo/compose.env from compose.env.example
      ansible.builtin.include_tasks: ../../tasks/archlinux-komodo-render-compose-env.yml
      tags: [arch-komodo, arch-periphery]

    # ─── Deploy Periphery ──────────────────────────────────────────────────
    - name: Build and (re)start Komodo Periphery (force-recreate for env/passkey fixes)
      ansible.builtin.shell: docker compose -f compose.yaml --env-file compose.env up -d --build --force-recreate
      args:
        chdir: "{{ komodo_dir }}"
      changed_when: true
      tags: [arch-komodo, arch-periphery]

    - name: Wait for Periphery to listen on :8120
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8120
        timeout: 90
      tags: [arch-komodo, arch-periphery]

    - name: Ensure Komodo Periphery service starts on boot
      ansible.builtin.include_tasks: ../../tasks/komodo-periphery-systemd.yml
      tags: [arch-komodo, arch-periphery]

    # ─── Media-server host directories ─────────────────────────────────────
    - name: Pre-create media-server config dirs (owner 1000:1000)
      file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"
      loop:
        - "{{ media_config_root_effective }}"
        - "{{ media_config_root_effective }}/profilarr/config"
        - "{{ media_config_root_effective }}/radarr/config"
        - "{{ media_config_root_effective }}/bazarr/config"
        - "{{ media_config_root_effective }}/sonarr/config"
        - "{{ media_config_root_effective }}/sonarr/scripts"
        - "{{ media_config_root_effective }}/prowlarr/config"
        - "{{ media_config_root_effective }}/sabnzbd/config"
        - "{{ media_config_root_effective }}/jellyfin/config"
      tags: [arch-komodo, arch-media-dirs]

    - name: Verify /mnt/storage is mounted (out-of-band setup required)
      shell: mountpoint -q "{{ media_data_root_effective }}"
      register: storage_mount
      changed_when: false
      failed_when: false
      tags: [arch-komodo, arch-media-dirs]

    - name: Warn if /mnt/storage is not mounted
      debug:
        msg: |
          {{ media_data_root_effective }} is not a mountpoint. The media-server stack
          assumes a real disk is mounted there. Set this up out of band
          (parted/mkfs/fstab) before deploying the media-server stack.
      when: storage_mount.rc != 0
      tags: [arch-komodo, arch-media-dirs]

    - name: Pre-create media-server data dirs (owner 1000:1000)
      file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"
      loop:
        - "{{ media_data_root_effective }}/movies"
        - "{{ media_data_root_effective }}/tv"
        - "{{ media_data_root_effective }}/books"
        - "{{ media_data_root_effective }}/downloads"
        - "{{ media_data_root_effective }}/downloads/complete"
        - "{{ media_data_root_effective }}/downloads/incomplete"
        - "{{ media_data_root_effective }}/cache"
        - "{{ media_data_root_effective }}/cache/transcode"
      when: storage_mount.rc == 0
      tags: [arch-komodo, arch-media-dirs]

    # ─── Komodo Core: sync Variable to BWS passkey (fixes "Not Okay" / Invalid passkey) ─
    # Periphery already uses komodo-dean-passkey from BWS. Core must send the same
    # string (stacks.toml uses [[KOMODO_PERIPHERY_PASSKEY]]). Update or create that
    # Variable via Core HTTP API (same UUIDs as mac-mini group_vars).
    - name: Resolve whether Komodo Core variable sync is enabled
      ansible.builtin.set_fact:
        komodo_core_url_effective: "{{ lookup('vars', 'komodo_core_url', default='') }}"
        komodo_periphery_passkey_variable_name_effective: "{{ lookup('vars', 'komodo_periphery_passkey_variable_name', default='KOMODO_PERIPHERY_PASSKEY') }}"
        komodo_core_admin_password_bws_uuid_effective: "{{ lookup('vars', 'komodo_core_admin_password_bws_uuid', default='') }}"
        komodo_periphery_passkey_bws_uuid_effective: "{{ lookup('vars', 'komodo_periphery_passkey_bws_uuid', default='') }}"
        komodo_core_sync_enabled_effective: >-
          {{
            (komodo_core_sync_passkey | default(true) | bool)
            and (lookup('vars', 'komodo_core_admin_password_bws_uuid', default='') | length > 0)
            and (lookup('vars', 'komodo_periphery_passkey_bws_uuid', default='') | length > 0)
            and (lookup('vars', 'komodo_core_url', default='') | length > 0)
            and (lookup('vars', 'komodo_periphery_passkey_variable_name', default='') | length > 0)
          }}
      tags: [arch-komodo, arch-periphery]

    - name: Fetch Komodo admin password from BWS (Core API login)
      ansible.builtin.shell: |
        set -euo pipefail
        /usr/local/bin/bws secret get "{{ komodo_core_admin_password_bws_uuid_effective }}" \
          --access-token "$(cat '{{ bws_token_file }}')" | jq -r .value | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
      args:
        executable: /bin/bash
      register: komodo_admin_for_core
      changed_when: false
      failed_when: false
      no_log: true
      when: komodo_core_sync_enabled_effective
      tags: [arch-komodo, arch-periphery]

    - name: Fetch komodo-dean-passkey from BWS (Core Variable value)
      ansible.builtin.shell: |
        set -euo pipefail
        /usr/local/bin/bws secret get "{{ komodo_periphery_passkey_bws_uuid_effective }}" \
          --access-token "$(cat '{{ bws_token_file }}')" | jq -r .value | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
      args:
        executable: /bin/bash
      register: komodo_passkey_for_core
      changed_when: false
      failed_when: false
      no_log: true
      when: komodo_core_sync_enabled_effective
      tags: [arch-komodo, arch-periphery]

    - name: Login to Komodo Core API (admin)
      ansible.builtin.uri:
        url: "{{ komodo_core_url_effective }}/auth/login/LoginLocalUser"
        method: POST
        body_format: json
        body:
          username: admin
          password: "{{ komodo_admin_for_core.stdout }}"
        status_code: 200
        timeout: 30
      register: komodo_core_login
      no_log: true
      when: >-
        komodo_core_sync_enabled_effective
        and komodo_admin_for_core.rc | default(1) == 0
        and komodo_passkey_for_core.rc | default(1) == 0
        and (komodo_admin_for_core.stdout | default('') | length) > 0
        and (komodo_passkey_for_core.stdout | default('') | length) > 0
      tags: [arch-komodo, arch-periphery]

    - name: Determine if Komodo Core login is usable
      ansible.builtin.set_fact:
        komodo_core_login_ready: >-
          {{
            komodo_core_sync_enabled_effective
            and (komodo_core_login is defined)
            and not (komodo_core_login.skipped | default(false))
            and not (komodo_core_login.failed | default(false))
            and ((komodo_core_login.get('json', {}).get('data', {}).get('jwt', '') | length) > 0)
          }}
      tags: [arch-komodo, arch-periphery]

    - name: List Komodo Variables from Core
      ansible.builtin.uri:
        url: "{{ komodo_core_url_effective }}/read/ListVariables"
        method: POST
        body_format: json
        body: {}
        headers:
          Authorization: "{{ komodo_core_login.get('json', {}).get('data', {}).get('jwt', '') }}"
        status_code: 200
        timeout: 30
      register: komodo_core_variables
      when: komodo_core_login_ready
      tags: [arch-komodo, arch-periphery]

    - name: Find existing periphery passkey variable on Core
      ansible.builtin.set_fact:
        komodo_core_passkey_var: "{{ (komodo_core_variables.json | default([]) | selectattr('name', 'equalto', komodo_periphery_passkey_variable_name_effective) | list) | first | default({}) }}"
      when: komodo_core_login_ready
      tags: [arch-komodo, arch-periphery]

    - name: Create Komodo Variable for periphery passkey (if missing)
      ansible.builtin.uri:
        url: "{{ komodo_core_url_effective }}/write/CreateVariable"
        method: POST
        body_format: json
        body:
          name: "{{ komodo_periphery_passkey_variable_name_effective }}"
          value: "{{ komodo_passkey_for_core.stdout }}"
          description: "Synced from BWS komodo-dean-passkey by Ansible Komodo playbooks"
          is_secret: true
        headers:
          Authorization: "{{ komodo_core_login.get('json', {}).get('data', {}).get('jwt', '') }}"
        status_code: 200
        timeout: 30
      when: >-
        komodo_core_login_ready
        and komodo_core_passkey_var == {}
      no_log: true
      tags: [arch-komodo, arch-periphery]

    - name: Update Komodo Variable to match BWS passkey (if drifted)
      ansible.builtin.uri:
        url: "{{ komodo_core_url_effective }}/write/UpdateVariableValue"
        method: POST
        body_format: json
        body:
          name: "{{ komodo_periphery_passkey_variable_name_effective }}"
          value: "{{ komodo_passkey_for_core.stdout }}"
        headers:
          Authorization: "{{ komodo_core_login.get('json', {}).get('data', {}).get('jwt', '') }}"
        status_code: 200
        timeout: 30
      when: >-
        komodo_core_login_ready
        and komodo_core_passkey_var != {}
        and ((komodo_core_passkey_var.value | default('') | string) != (komodo_passkey_for_core.stdout | string))
      no_log: true
      tags: [arch-komodo, arch-periphery]

    - name: Note when Core variable sync was skipped
      ansible.builtin.debug:
        msg: >-
          Komodo Core variable sync skipped: bws could not read admin password or
          passkey (grant this machine account read on those secrets), or Core at
          {{ komodo_core_url_effective }} unreachable. Set komodo_core_sync_passkey: false to silence.
      when: >-
        komodo_core_sync_enabled_effective
        and (
          komodo_admin_for_core.rc | default(1) != 0
          or komodo_passkey_for_core.rc | default(1) != 0
          or (komodo_admin_for_core.stdout | default('') | length) == 0
          or (komodo_passkey_for_core.stdout | default('') | length) == 0
          or (komodo_core_login is defined and (komodo_core_login.failed | default(false)))
        )
      tags: [arch-komodo, arch-periphery]

    - name: Note when Core variable sync is disabled by missing vars
      ansible.builtin.debug:
        msg: >-
          Komodo Core variable sync disabled for this host because one or more required vars
          are missing (komodo_core_url, komodo_core_admin_password_bws_uuid,
          komodo_periphery_passkey_bws_uuid, komodo_periphery_passkey_variable_name).
      when: not komodo_core_sync_enabled_effective
      tags: [arch-komodo, arch-periphery]

    - name: Verify key workstation commands are installed
      ansible.builtin.command: bash -lc "command -v {{ item }}"
      register: workstation_command_checks
      changed_when: false
      failed_when: false
      loop: "{{ archlinux_workstation_verify_commands }}"
      tags: [arch-komodo, arch-periphery]

    - name: Verify configured services are active
      ansible.builtin.command: systemctl is-active "{{ item }}"
      register: workstation_service_checks
      changed_when: false
      failed_when: false
      loop: "{{ archlinux_workstation_enable_services }}"
      tags: [arch-komodo, arch-periphery]

    # ─── Summary ───────────────────────────────────────────────────────────
    - name: Show summary
      ansible.builtin.debug:
        msg: |
          Komodo Periphery is up on https://{{ archlinux_ip }}:8120

          When komodo_core_sync_passkey is true (default), this playbook also logs
          into Komodo Core at {{ komodo_core_url }} and sets Variable
          {{ komodo_periphery_passkey_variable_name }} to the BWS komodo-dean-passkey
          value so Core matches Periphery (ResourceSync [[...]] reference).

          Workstation command checks:
          {% for check in workstation_command_checks.results | default([]) %}
          - {{ check.item }}: {{ 'ok' if check.rc == 0 else 'missing' }}
          {% endfor %}

          Service checks:
          {% for check in workstation_service_checks.results | default([]) %}
          - {{ check.item }}: {{ check.stdout | default('unknown') }}
          {% endfor %}

          Next steps (if server still missing): in Komodo UI or resource-sync/stacks.toml,
            1. Server in stacks.toml at https://{{ archlinux_ip }}:8120 (if still used)
            2. murderbot/media-server/ in git; ResourceSync registers stacks
