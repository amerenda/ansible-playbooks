---
# Bootstrap the murderbot (Debian) host as a Komodo Periphery agent for
# amerenda/komodo-dean-gitops. After this play, Komodo Core (mac-mini-m4)
# can deploy stacks under `murderbot/` to this host (e.g. media-server).
#
# Periphery passkey: `tasks/archlinux-komodo-render-compose-env.yml` is
# included on every run. It writes PERIPHERY_PASSKEYS from BWS
# (komodo-dean-passkey) and strips leading/trailing whitespace so Core and
# Periphery agree (avoids "Invalid passkey" when the secret has stray newlines).
#
# Re-running this playbook refreshes `compose.env` and **force-recreates** the
# Periphery container so env changes always apply (troubleshooting Komodo).
#
# Run (first bootstrap needs a token; re-runs can omit it if /etc/komodo/.bws-secret exists):
#   ansible-playbook -i inventory/inventory.ini \
#     playbooks/infrastructure/setup-debian-komodo.yml \
#     --extra-vars "bws_access_token=<YOUR_BWS_TOKEN>"
#
# Tags: debian-komodo, debian-bws, debian-periphery, debian-media-dirs

- name: Bootstrap Komodo Periphery on murderbot (Debian)
  hosts: murderbot_komodo_hosts
  gather_facts: yes
  become: yes
  vars_files:
    - ../../group_vars/murderbot_komodo_hosts.yml
  vars:
    target_user: "{{ ansible_user }}"
    compose_dir: "/home/{{ target_user }}/komodo-dean-gitops"
    murderbot_repo_dir: "{{ compose_dir }}/murderbot"
    komodo_dir: "{{ murderbot_repo_dir }}/komodo"
    komodo_etc: "/etc/komodo"
    bws_token_file: "{{ komodo_etc }}/.bws-secret"

  pre_tasks:
    - name: Stat existing BWS token on host
      ansible.builtin.stat:
        path: "{{ bws_token_file }}"
      register: bws_secret_stat

    - name: Fail if no BWS token on host and none passed in
      ansible.builtin.fail:
        msg: |
          For first bootstrap, pass --extra-vars "bws_access_token=<TOKEN>".
          To re-run without passing the token, ensure {{ bws_token_file }} exists
          (from a previous bootstrap).
      when:
        - not bws_secret_stat.stat.exists
        - bws_access_token is not defined or (bws_access_token | default('') | length) == 0

  tasks:
    # ─── System packages ───────────────────────────────────────────────────
    # Hosts previously set up with Docker CE (docker.com apt repo) keep
    # docker-buildx-plugin / docker-compose-plugin, which own the same paths as
    # Debian's docker-buildx and docker-compose-plugin pulled in by docker.io.
    # Purge those first or apt fails with "trying to overwrite ... docker-buildx".
    - name: Finish interrupted dpkg runs (safe after a failed docker.io install)
      ansible.builtin.command: dpkg --configure -a
      register: murderbot_dpkg_configure
      changed_when: "'Setting up' in murderbot_dpkg_configure.stdout"
      failed_when: false
      tags: [debian-komodo, debian-periphery]

    - name: Remove Docker Inc packages that conflict with Debian docker.io stack
      ansible.builtin.apt:
        name:
          - docker-buildx-plugin
          - docker-compose-plugin
        state: absent
        purge: true
      tags: [debian-komodo, debian-periphery]

    - name: Install host packages (Docker, jq, git, curl, unzip)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
          - jq
          - git
          - curl
          - unzip
        state: present
        update_cache: yes
      tags: [debian-komodo, debian-periphery]

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started
      tags: [debian-komodo, debian-periphery]

    - name: Add target user to docker group
      user:
        name: "{{ target_user }}"
        groups: docker
        append: yes
      tags: [debian-komodo, debian-periphery]

    # ─── bws CLI on host (also used to render compose.env) ─────────────────
    - name: Detect host architecture for bws CLI
      set_fact:
        bws_target: "{{ 'aarch64-unknown-linux-gnu' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'x86_64-unknown-linux-gnu' }}"
      tags: [debian-komodo, debian-bws]

    - name: Check if bws CLI is already installed
      stat:
        path: /usr/local/bin/bws
      register: bws_check
      tags: [debian-komodo, debian-bws]

    - name: Install bws CLI
      unarchive:
        src: "https://github.com/bitwarden/sdk-sm/releases/download/bws-v{{ bws_version }}/bws-{{ bws_target }}-{{ bws_version }}.zip"
        dest: /usr/local/bin/
        remote_src: yes
        mode: "0755"
      when: not bws_check.stat.exists
      tags: [debian-komodo, debian-bws]

    # ─── BWS access token on disk ──────────────────────────────────────────
    - name: Ensure /etc/komodo exists
      file:
        path: "{{ komodo_etc }}"
        state: directory
        mode: "0755"
      tags: [debian-komodo, debian-bws, debian-periphery]

    - name: Write BWS access token (mode 0600)
      ansible.builtin.copy:
        content: "{{ bws_access_token }}"
        dest: "{{ bws_token_file }}"
        mode: "0600"
        owner: root
        group: root
      no_log: true
      when: bws_access_token is defined and (bws_access_token | length) > 0
      tags: [debian-komodo, debian-bws, debian-periphery]

    # ─── komodo-dean-gitops checkout ──────────────────────────────────────
    - name: Check if komodo-dean-gitops repo exists
      stat:
        path: "{{ compose_dir }}/.git"
      register: compose_repo_check
      tags: [debian-komodo, debian-periphery, debian-media-dirs]

    - name: Clone komodo-dean-gitops
      git:
        repo: "{{ compose_repo }}"
        dest: "{{ compose_dir }}"
        version: main
      become: no
      when: not compose_repo_check.stat.exists
      tags: [debian-komodo, debian-periphery, debian-media-dirs]

    - name: Pull latest komodo-dean-gitops
      shell: "git -C {{ compose_dir }} pull --ff-only"
      become: no
      changed_when: false
      when: compose_repo_check.stat.exists
      tags: [debian-komodo, debian-periphery, debian-media-dirs]

    # If origin/main does not yet contain murderbot/komodo/, the path is missing
    # after clone. copy: will not create parent dirs — create them explicitly.
    # become: false so new dirs under ~ are owned by the login user (not root).
    - name: Ensure murderbot/komodo directory exists
      ansible.builtin.file:
        path: "{{ komodo_dir }}"
        state: directory
        mode: "0755"
      become: false
      tags: [debian-komodo, debian-periphery, debian-media-dirs]

    # If compose.env.example is still missing (stale main), seed from the copy
    # bundled with this playbook only when absent (force: no).
    - name: Ensure murderbot/komodo/compose.env.example exists
      ansible.builtin.copy:
        src: archlinux-komodo-compose.env.example
        dest: "{{ komodo_dir }}/compose.env.example"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        force: false
      tags: [debian-komodo, debian-periphery, debian-media-dirs]

    # docker compose requires compose.yaml (or docker-compose.yml) in chdir;
    # seed from playbook when repo main does not yet include murderbot/komodo/.
    - name: Ensure murderbot/komodo/compose.yaml exists
      ansible.builtin.copy:
        src: archlinux-komodo-compose.yaml
        dest: "{{ komodo_dir }}/compose.yaml"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        force: false
      tags: [debian-komodo, debian-periphery, debian-media-dirs]

    - name: Ensure murderbot/komodo/Dockerfile.periphery exists
      ansible.builtin.copy:
        src: archlinux-komodo-Dockerfile.periphery
        dest: "{{ komodo_dir }}/Dockerfile.periphery"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        force: false
      tags: [debian-komodo, debian-periphery, debian-media-dirs]

    # ─── Render Periphery compose.env from BWS ─────────────────────────────
    # Do not use sed for passkey injection: Komodo passkeys often contain
    # characters that break sed. Python str.replace is safe. Passkey is
    # stripped of leading/trailing whitespace after BWS decode (avoids Core vs
    # Periphery mismatch when the secret has a trailing newline).
    - name: Render murderbot/komodo/compose.env from compose.env.example
      ansible.builtin.include_tasks: ../../tasks/archlinux-komodo-render-compose-env.yml
      tags: [debian-komodo, debian-periphery]

    # ─── Deploy Periphery ──────────────────────────────────────────────────
    - name: Build and (re)start Komodo Periphery (force-recreate for env/passkey fixes)
      ansible.builtin.shell: docker compose -f compose.yaml --env-file compose.env up -d --build --force-recreate
      args:
        chdir: "{{ komodo_dir }}"
      changed_when: true
      tags: [debian-komodo, debian-periphery]

    - name: Wait for Periphery to listen on :8120
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8120
        timeout: 90
      tags: [debian-komodo, debian-periphery]

    # ─── Media-server host directories ─────────────────────────────────────
    - name: Pre-create media-server config dirs (owner 1000:1000)
      file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"
      loop:
        - "{{ media_config_root }}"
        - "{{ media_config_root }}/profilarr/config"
        - "{{ media_config_root }}/radarr/config"
        - "{{ media_config_root }}/bazarr/config"
        - "{{ media_config_root }}/sonarr/config"
        - "{{ media_config_root }}/sonarr/scripts"
        - "{{ media_config_root }}/prowlarr/config"
        - "{{ media_config_root }}/sabnzbd/config"
        - "{{ media_config_root }}/jellyfin/config"
      tags: [debian-komodo, debian-media-dirs]

    - name: Verify /mnt/storage is mounted (out-of-band setup required)
      shell: mountpoint -q "{{ media_data_root }}"
      register: storage_mount
      changed_when: false
      failed_when: false
      tags: [debian-komodo, debian-media-dirs]

    - name: Warn if /mnt/storage is not mounted
      debug:
        msg: |
          {{ media_data_root }} is not a mountpoint. The media-server stack
          assumes a real disk is mounted there. Set this up out of band
          (parted/mkfs/fstab) before deploying the media-server stack.
      when: storage_mount.rc != 0
      tags: [debian-komodo, debian-media-dirs]

    - name: Pre-create media-server data dirs (owner 1000:1000)
      file:
        path: "{{ item }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"
      loop:
        - "{{ media_data_root }}/movies"
        - "{{ media_data_root }}/tv"
        - "{{ media_data_root }}/books"
        - "{{ media_data_root }}/downloads"
        - "{{ media_data_root }}/downloads/complete"
        - "{{ media_data_root }}/downloads/incomplete"
        - "{{ media_data_root }}/cache"
        - "{{ media_data_root }}/cache/transcode"
      when: storage_mount.rc == 0
      tags: [debian-komodo, debian-media-dirs]

    # ─── Komodo Core: sync Variable to BWS passkey (fixes "Not Okay" / Invalid passkey) ─
    # Periphery already uses komodo-dean-passkey from BWS. Core must send the same
    # string (stacks.toml uses [[KOMODO_PERIPHERY_PASSKEY]]). Update or create that
    # Variable via Core HTTP API (same UUIDs as mac-mini group_vars).
    - name: Fetch Komodo admin password from BWS (Core API login)
      ansible.builtin.shell: |
        set -euo pipefail
        /usr/local/bin/bws secret get "{{ komodo_core_admin_password_bws_uuid }}" \
          --access-token "$(cat '{{ bws_token_file }}')" | jq -r .value | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
      args:
        executable: /bin/bash
      register: komodo_admin_for_core
      changed_when: false
      failed_when: false
      no_log: true
      when: komodo_core_sync_passkey | default(true)
      tags: [debian-komodo, debian-periphery]

    - name: Fetch komodo-dean-passkey from BWS (Core Variable value)
      ansible.builtin.shell: |
        set -euo pipefail
        /usr/local/bin/bws secret get "{{ komodo_periphery_passkey_bws_uuid }}" \
          --access-token "$(cat '{{ bws_token_file }}')" | jq -r .value | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
      args:
        executable: /bin/bash
      register: komodo_passkey_for_core
      changed_when: false
      failed_when: false
      no_log: true
      when: komodo_core_sync_passkey | default(true)
      tags: [debian-komodo, debian-periphery]

    - name: Login to Komodo Core API (admin)
      ansible.builtin.uri:
        url: "{{ komodo_core_url }}/auth/login/LoginLocalUser"
        method: POST
        body_format: json
        body:
          username: admin
          password: "{{ komodo_admin_for_core.stdout }}"
        status_code: 200
        timeout: 30
      register: komodo_core_login
      no_log: true
      when: >-
        komodo_core_sync_passkey | default(true)
        and komodo_admin_for_core.rc | default(1) == 0
        and komodo_passkey_for_core.rc | default(1) == 0
        and (komodo_admin_for_core.stdout | default('') | length) > 0
        and (komodo_passkey_for_core.stdout | default('') | length) > 0
      tags: [debian-komodo, debian-periphery]

    - name: List Komodo Variables from Core
      ansible.builtin.uri:
        url: "{{ komodo_core_url }}/read/ListVariables"
        method: POST
        body_format: json
        body: {}
        headers:
          Authorization: "{{ komodo_core_login.json.data.jwt }}"
        status_code: 200
        timeout: 30
      register: komodo_core_variables
      when: komodo_core_login is succeeded
      tags: [debian-komodo, debian-periphery]

    - name: Find existing periphery passkey variable on Core
      ansible.builtin.set_fact:
        komodo_core_passkey_var: "{{ (komodo_core_variables.json | default([]) | selectattr('name', 'equalto', komodo_periphery_passkey_variable_name) | list) | first | default({}) }}"
      when: komodo_core_login is succeeded
      tags: [debian-komodo, debian-periphery]

    - name: Create Komodo Variable for periphery passkey (if missing)
      ansible.builtin.uri:
        url: "{{ komodo_core_url }}/write/CreateVariable"
        method: POST
        body_format: json
        body:
          name: "{{ komodo_periphery_passkey_variable_name }}"
          value: "{{ komodo_passkey_for_core.stdout }}"
          description: "Synced from BWS komodo-dean-passkey by Ansible Komodo playbooks"
          is_secret: true
        headers:
          Authorization: "{{ komodo_core_login.json.data.jwt }}"
        status_code: 200
        timeout: 30
      when: >-
        komodo_core_login is succeeded
        and komodo_core_passkey_var == {}
      no_log: true
      tags: [debian-komodo, debian-periphery]

    - name: Update Komodo Variable to match BWS passkey (if drifted)
      ansible.builtin.uri:
        url: "{{ komodo_core_url }}/write/UpdateVariableValue"
        method: POST
        body_format: json
        body:
          name: "{{ komodo_periphery_passkey_variable_name }}"
          value: "{{ komodo_passkey_for_core.stdout }}"
        headers:
          Authorization: "{{ komodo_core_login.json.data.jwt }}"
        status_code: 200
        timeout: 30
      when: >-
        komodo_core_login is succeeded
        and komodo_core_passkey_var != {}
        and ((komodo_core_passkey_var.value | default('') | string) != (komodo_passkey_for_core.stdout | string))
      no_log: true
      tags: [debian-komodo, debian-periphery]

    - name: Note when Core variable sync was skipped
      ansible.builtin.debug:
        msg: >-
          Komodo Core variable sync skipped: bws could not read admin password or
          passkey (grant this machine account read on those secrets), or Core at
          {{ komodo_core_url }} unreachable. Set komodo_core_sync_passkey: false to silence.
      when: >-
        komodo_core_sync_passkey | default(true)
        and (
          komodo_admin_for_core.rc | default(1) != 0
          or komodo_passkey_for_core.rc | default(1) != 0
          or (komodo_admin_for_core.stdout | default('') | length) == 0
          or (komodo_passkey_for_core.stdout | default('') | length) == 0
          or komodo_core_login is failed
        )
      tags: [debian-komodo, debian-periphery]

    # ─── Summary ───────────────────────────────────────────────────────────
    - name: Show summary
      ansible.builtin.debug:
        msg: |
          Komodo Periphery is up on https://{{ murderbot_ip }}:8120

          When komodo_core_sync_passkey is true (default), this playbook also logs
          into Komodo Core at {{ komodo_core_url }} and sets Variable
          {{ komodo_periphery_passkey_variable_name }} to the BWS komodo-dean-passkey
          value so Core matches Periphery (ResourceSync [[...]] reference).

          Next steps (if server still missing): in Komodo UI or resource-sync/stacks.toml,
            1. Server "murderbot" in stacks.toml at https://{{ murderbot_ip }}:8120
            2. murderbot/media-server/ in git; ResourceSync registers stacks
