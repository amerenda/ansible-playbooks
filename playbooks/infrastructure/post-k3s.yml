- name: Post K3s Setup
  hosts: all
  become: yes
  gather_facts: yes
  tags: [k3s, post-setup]

  vars:
    # Longhorn storage configuration
    enable_longhorn_storage: "{{ (longhorn_storage_enabled | default(true)) | bool }}"
    longhorn_taints:
      - "longhorn:NoSchedule"
    longhorn_labels:
      - "longhorn-storage=true"
      - "longhorn.io/storage=true"
    rpi5_labels:
      - "rpi5-host=true"
    flannel_taints:
      - "flannel.io/required=true:NoSchedule"

    # archlinux: optional label for nodeSelector / docs (no dedicated NoSchedule taint — ARC builders schedule here)
    archlinux_dedicated_label: "archlinux=true"

    # Longhorn: use explicit [storage] if set; otherwise inventory group longhorn_nodes (see inventory.ini).
    # Without this, an empty [storage] made every host "non-storage" (stripped labels, allowScheduling=false).
    longhorn_schedule_hosts: >-
      {{
        groups['storage']
        if ('storage' in groups and groups['storage'] | length > 0)
        else (groups['longhorn_nodes'] | default([]))
      }}

  pre_tasks:
    - name: Check if k3s is installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_installed
      tags: [k3s, check]

    - name: Fail if k3s is not installed
      fail:
        msg: "k3s is not installed on this node. Please run k3s-worker.yml first for longhorn-only nodes."
      when: not k3s_installed.stat.exists
      tags: [k3s, check]

    - name: Check if kubectl is available and cluster is ready
      shell: |
        kubectl get nodes --no-headers | wc -l
      delegate_to: localhost
      become: no
      register: kubectl_check
      failed_when: false
      tags: [k3s, post-setup]

  tasks:
    # STORAGE LABELS
    - name: Add longhorn-storage labels to storage nodes
      shell: |
        kubectl label node {{ inventory_hostname }} {{ item }} --overwrite
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname in longhorn_schedule_hosts
      loop: "{{ longhorn_labels }}"
      tags: [k3s, labels, longhorn, storage]

    - name: Remove Longhorn storage labels from node
      shell: |
        kubectl label node {{ inventory_hostname }} {{ item.split('=')[0] }}- || true
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname not in longhorn_schedule_hosts
      loop: "{{ longhorn_labels }}"
      tags: [k3s, labels, longhorn]

    # NODE ROLE LABEL (can't be set via kubelet --node-labels, must use kubectl)
    - name: Add node-role label to storage_only nodes
      shell: |
        kubectl label node {{ inventory_hostname }} node-role.kubernetes.io/longhorn-storage=true --overwrite
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname in (groups['storage_only'] | default([]))
      tags: [k3s, labels, longhorn]

    # STORAGE ONLY TAINTS
    - name: Add Longhorn-only taints to storage_only nodes
      shell: |
        kubectl taint node {{ inventory_hostname }} {{ item }} --overwrite
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname in (groups['storage_only'] | default([]))
      loop: "{{ longhorn_taints }}"
      tags: [k3s, taints]
  
    - name: Remove Longhorn-only taints from nodes not in the "storage_only" group
      shell: |
        kubectl taint node {{ inventory_hostname }} {{ item }}- || true
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname not in (groups['storage_only'] | default([]))
      loop: "{{ longhorn_taints }}"
      tags: [k3s, taints]

    - name: Add flannel taints to storage_only nodes
      shell: |
        kubectl taint node {{ inventory_hostname }} {{ item }} --overwrite
      delegate_to: localhost
      become: no
      when: inventory_hostname in (groups['storage_only'] | default([]))
      loop: "{{ flannel_taints }}"
      tags: [k3s, taints]

    - name: Remove flannel taints from nodes not in the "storage_only" group
      shell: |
        kubectl taint node {{ inventory_hostname }} {{ item }}- || true
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname not in (groups['storage_only'] | default([]))
      loop: "{{ flannel_taints }}"
      tags: [k3s, taints]

    # ARCHLINUX LABEL (taints removed — workloads use nodeSelector archlinux=true if they must land here)
    - name: Label archlinux dedicated node
      shell: |
        kubectl label node {{ inventory_hostname }} {{ archlinux_dedicated_label }} --overwrite
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname in (groups['archlinux_k3s'] | default([]))
      tags: [k3s, labels, archlinux]

    - name: Remove archlinux dedicated label from other nodes
      shell: |
        kubectl label node {{ inventory_hostname }} archlinux- || true
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname not in (groups['archlinux_k3s'] | default([]))
      tags: [k3s, labels, archlinux]

    - name: Remove archlinux dedicated taint from archlinux_k3s nodes (idempotent)
      shell: |
        kubectl taint node {{ inventory_hostname }} archlinux=true:NoSchedule- || true
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname in (groups['archlinux_k3s'] | default([]))
      tags: [k3s, taints, archlinux]

    - name: Remove archlinux dedicated taint from other nodes
      shell: |
        kubectl taint node {{ inventory_hostname }} archlinux=true:NoSchedule- || true
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname not in (groups['archlinux_k3s'] | default([]))
      tags: [k3s, taints, archlinux]

    # LONGHORN NODE SCHEDULING
    - name: Enable Longhorn scheduling on storage nodes
      shell: |
        kubectl patch nodes.longhorn.io -n default {{ inventory_hostname }} --type merge -p '{"spec":{"allowScheduling":true}}' 2>/dev/null || true
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname in longhorn_schedule_hosts
      tags: [k3s, longhorn, storage]

    - name: Disable Longhorn scheduling on non-storage nodes
      shell: |
        kubectl patch nodes.longhorn.io -n default {{ inventory_hostname }} --type merge -p '{"spec":{"allowScheduling":false}}' 2>/dev/null || true
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname not in longhorn_schedule_hosts
      tags: [k3s, longhorn, storage]

    # archlinux: Longhorn disk path (see group_vars/archlinux_k3s.yml). Manager pod nsenters host for iscsiadm.
    - name: Check iscsiadm on archlinux host (required by longhorn-manager)
      ansible.builtin.command:
        argv: [iscsiadm, --version]
      register: longhorn_arch_iscsiadm
      changed_when: false
      failed_when: false
      when: inventory_hostname in (groups['archlinux_k3s'] | default([]))
      tags: [k3s, longhorn, archlinux]

    - name: Fail with install hint if iscsiadm missing on archlinux
      ansible.builtin.fail:
        msg: >-
          Longhorn manager needs open-iscsi on the host (iscsiadm). Without it the manager
          CrashLoops and no nodes.longhorn.io/{{ inventory_hostname }} CR is created.
          Run: ansible-playbook -i inventory/inventory.ini
          playbooks/infrastructure/longhorn-storage.yml --limit {{ inventory_hostname }}
      when:
        - inventory_hostname in (groups['archlinux_k3s'] | default([]))
        - longhorn_arch_iscsiadm is not skipped
        - longhorn_arch_iscsiadm.rc | default(-1) != 0
      tags: [k3s, longhorn, archlinux]

    # kubectl on archlinux (not delegate_to localhost): kubeconfig + group_vars/host_vars apply here.
    - name: Configure Longhorn disk path on archlinux
      when: inventory_hostname in (groups['archlinux_k3s'] | default([]))
      tags: [k3s, longhorn, archlinux]
      become: false
      block:
        # Block-local facts: lookup('vars') avoids undefined-name errors when group_vars merge is odd.
        - name: Resolve Longhorn path facts for this block
          ansible.builtin.set_fact:
            lh_arch_longhorn_path: "{{ lookup('vars', 'longhorn_host_disk_path', default='/mnt/storage/longhorn') }}"
            lh_arch_longhorn_ns: "{{ lookup('vars', 'longhorn_k8s_namespace', default='default') }}"

        # Longhorn Node CR can exist with spec.disks: {} when defaultDiskSelector requires a tagged disk
        # (see k3s-dean-gitops infra/longhorn/values.yaml defaultDiskSelector: storage).
        - name: Wait for Longhorn Node CR on archlinux
          ansible.builtin.command: >-
            kubectl get nodes.longhorn.io {{ inventory_hostname }}
            -n {{ lh_arch_longhorn_ns }}
            -o json
          register: lh_arch_node
          until: >-
            lh_arch_node.rc == 0
            and lh_arch_node.stdout | length > 0
            and (lh_arch_node.stdout | from_json).metadata is defined
            and (lh_arch_node.stdout | from_json).metadata.name == inventory_hostname
          retries: 36
          delay: 10
          changed_when: false

        - name: Add default-disk on archlinux when Longhorn has no disks
          ansible.builtin.shell: >-
            kubectl patch nodes.longhorn.io {{ inventory_hostname }}
            -n {{ lh_arch_longhorn_ns }}
            --type merge
            -p "{\"spec\":{\"disks\":{\"default-disk\":{\"path\":\"{{ lh_arch_longhorn_path }}\",\"allowScheduling\":true,\"tags\":[\"storage\"]}}}}"
          register: lh_arch_add_disk
          changed_when: "'patched' in (lh_arch_add_disk.stdout | default(''))"
          failed_when: lh_arch_add_disk.rc != 0
          when: >-
            (lh_arch_node.stdout | from_json).spec.disks | default({}) | dict2items | length == 0

        - name: Re-fetch Longhorn Node archlinux after disk create
          ansible.builtin.command: >-
            kubectl get nodes.longhorn.io {{ inventory_hostname }}
            -n {{ lh_arch_longhorn_ns }}
            -o json
          register: lh_arch_node
          changed_when: false

        - name: Fail if Longhorn Node archlinux still has no disks
          ansible.builtin.fail:
            msg: >-
              Longhorn Node spec.disks is still empty (defaultDiskSelector may reject the disk).
              kubectl describe nodes.longhorn.io {{ inventory_hostname }} -n {{ lh_arch_longhorn_ns }}
          when: >-
            (lh_arch_node.stdout | from_json).spec.disks | default({}) | dict2items | length == 0

        - name: Resolve Longhorn disk key on archlinux
          ansible.builtin.set_fact:
            lh_arch_disk_name: >-
              {{
                'default-disk'
                if 'default-disk' in (lh_arch_node.stdout | from_json).spec.disks
                else ((lh_arch_node.stdout | from_json).spec.disks.keys() | list | first)
              }}

        - name: Patch Longhorn disk path to longhorn_host_disk_path
          ansible.builtin.command:
            argv:
              - kubectl
              - patch
              - nodes.longhorn.io/{{ inventory_hostname }}
              - -n
              - "{{ lh_arch_longhorn_ns }}"
              - --type=json
              - -p
              - >-
                [{"op":"replace","path":"/spec/disks/{{ lh_arch_disk_name }}/path","value":"{{ lh_arch_longhorn_path }}"}]
          register: lh_arch_patch
          changed_when: lh_arch_patch.rc == 0
          failed_when: lh_arch_patch.rc != 0
          when: >-
            (lh_arch_node.stdout | from_json).spec.disks[lh_arch_disk_name].path | default('')
            != lh_arch_longhorn_path

    - name: Add rpi5 hosts labels to rpi5 hosts
      shell: |
        kubectl label node {{ inventory_hostname }} {{ item }} --overwrite
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname in (groups['rpi5-hosts'] | default([]))
      loop: "{{ rpi5_labels }}"
      tags: [k3s, labels]

    - name: Remove rpi5 hosts label from non-rpi5 hosts
      shell: |
        kubectl label node {{ inventory_hostname }} {{ item.split('=')[0] }}- || true
      delegate_to: localhost
      become: no
      changed_when: false
      when: inventory_hostname not in (groups['rpi5-hosts'] | default([]))
      loop: "{{ rpi5_labels }}"
      tags: [k3s, labels]