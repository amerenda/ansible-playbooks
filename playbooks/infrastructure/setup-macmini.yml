---
# Mac Mini M4 Setup Playbook
# Prepares the Mac Mini as a k3s controller node
# k3s runs inside OrbStack's Linux VM with bridged networking
#
# Prerequisites:
#   - OrbStack installed: brew install --cask orbstack
#   - OrbStack Linux machine created: orb create ubuntu macmini
#   - SSH access configured to the OrbStack VM
#
# Run:
#   K3S_TOKEN=<token> ansible-playbook -i inventory/inventory.ini playbooks/infrastructure/setup-macmini.yml
#
# Tags:
#   macmini         — Everything
#   mini-homebrew   — Install Homebrew packages on macOS host
#   mini-system     — Hostname, timezone
#   mini-tailscale  — Tailscale VPN setup
#   mini-k3s        — Install k3s controller in OrbStack VM
#   mini-summary    — Show setup summary

- name: Setup Mac Mini M4 as k3s agent
  hosts: macmini_hosts
  gather_facts: yes
  tags: [macmini]

  vars_files:
    - ../../group_vars/macmini_hosts.yml

  vars:
    target_user: "{{ ansible_user }}"
    macmini_hostname: "mac-mini-m4"
    k3s_token: "{{ lookup('env', 'K3S_TOKEN') }}"
    k3s_server_ip: "10.100.20.10"

  pre_tasks:
    - name: Validate K3S_TOKEN is set
      fail:
        msg: "K3S_TOKEN env var must be set. Run: K3S_TOKEN=<token> ansible-playbook ..."
      when: k3s_token == ""
      tags: [mini-k3s]

  tasks:
    # ─── Homebrew ──────────────────────────────────────────────────────────
    - name: Check if Homebrew is installed
      stat:
        path: /opt/homebrew/bin/brew
      register: homebrew_check
      tags: [mini-homebrew]

    - name: Install Homebrew
      shell: |
        NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when: not homebrew_check.stat.exists
      become: no
      tags: [mini-homebrew]

    - name: Ensure Homebrew is in PATH (zprofile)
      lineinfile:
        path: "/Users/{{ target_user }}/.zprofile"
        line: 'eval "$(/opt/homebrew/bin/brew shellenv)"'
        create: yes
      become: no
      tags: [mini-homebrew]

    - name: Install Homebrew packages
      community.general.homebrew:
        name: "{{ homebrew_packages }}"
        state: present
      become: no
      tags: [mini-homebrew]

    - name: Install OrbStack
      community.general.homebrew_cask:
        name: orbstack
        state: present
      become: no
      tags: [mini-homebrew]

    # ─── System ────────────────────────────────────────────────────────────
    - name: Set timezone
      become: yes
      command: systemsetup -settimezone "{{ timezone }}"
      changed_when: false
      tags: [mini-system]

    - name: Set hostname
      become: yes
      shell: |
        scutil --set ComputerName "{{ macmini_hostname }}"
        scutil --set HostName "{{ macmini_hostname }}"
        scutil --set LocalHostName "{{ macmini_hostname }}"
      changed_when: false
      tags: [mini-system]

    # ─── Tailscale ─────────────────────────────────────────────────────────
    - name: Check if Tailscale is running
      shell: /opt/homebrew/bin/tailscale status 2>&1
      register: tailscale_status
      failed_when: false
      changed_when: false
      become: no
      tags: [mini-tailscale]

    - name: Start Tailscale daemon
      become: no
      shell: sudo /opt/homebrew/bin/brew services start tailscale
      environment:
        HOMEBREW_SERVICES_NO_DOMAIN_WARNING: "1"
      when: tailscale_status.rc != 0
      tags: [mini-tailscale]

    - name: Show Tailscale status
      debug:
        msg: |
          Tailscale status: {{ tailscale_status.stdout_lines | default(['not running']) }}

          If not authenticated, SSH into the Mini and run:
            tailscale up --accept-routes --ssh
      tags: [mini-tailscale]

    # ─── OrbStack Linux VM ────────────────────────────────────────────────
    - name: Start OrbStack
      shell: /opt/homebrew/bin/orbctl start 2>/dev/null
      become: no
      failed_when: false
      changed_when: false
      tags: [mini-k3s]

    - name: Check if OrbStack Linux machine exists
      shell: /opt/homebrew/bin/orb list 2>/dev/null | grep -q macmini
      register: orb_machine_check
      failed_when: false
      changed_when: false
      become: no
      tags: [mini-k3s]

    - name: Create OrbStack Linux machine (Ubuntu)
      shell: /opt/homebrew/bin/orb create --arch arm64 ubuntu macmini
      when: orb_machine_check.rc != 0
      become: no
      tags: [mini-k3s]

    # ─── k3s Controller in OrbStack VM ────────────────────────────────────
    - name: Install k3s prerequisites in OrbStack VM
      shell: |
        /opt/homebrew/bin/orb -m macmini sudo bash -c '
          apt-get update -qq
          apt-get install -y -qq curl open-iscsi nfs-common cryptsetup-bin >/dev/null
          systemctl enable --now iscsid
          modprobe iscsi_tcp nfs dm_crypt 2>/dev/null || true
          echo iscsi_tcp >> /etc/modules-load.d/longhorn.conf
          echo nfs >> /etc/modules-load.d/longhorn.conf
          echo dm_crypt >> /etc/modules-load.d/longhorn.conf
        '
      become: no
      tags: [mini-k3s]

    - name: Check if k3s is already installed in OrbStack VM
      shell: /opt/homebrew/bin/orb -m macmini which k3s 2>/dev/null
      register: k3s_check
      failed_when: false
      changed_when: false
      become: no
      tags: [mini-k3s]

    - name: Uninstall previous k3s if exists (clean slate)
      shell: /opt/homebrew/bin/orb -m macmini sudo k3s-uninstall.sh 2>/dev/null || /opt/homebrew/bin/orb -m macmini sudo k3s-agent-uninstall.sh 2>/dev/null || true
      when: k3s_check.rc == 0
      become: no
      tags: [mini-k3s]

    - name: Install k3s agent in OrbStack VM
      shell: |
        /opt/homebrew/bin/orb -m macmini sudo bash -c '
          curl -sfL https://get.k3s.io | \
            INSTALL_K3S_VERSION="{{ k3s_version }}" \
            K3S_TOKEN="{{ k3s_token }}" \
            K3S_URL="https://{{ k3s_server_ip }}:6443" \
            INSTALL_K3S_EXEC="agent \
              --node-name={{ macmini_hostname }} \
              --node-label=longhorn.io/storage=true \
              --node-label=longhorn-storage=true \
              --node-label=macmini-agent=true \
              --kubelet-arg=max-pods=110 \
              --kubelet-arg=kube-reserved=cpu=200m,memory=1Gi \
              --kubelet-arg=system-reserved=cpu=200m,memory=1Gi" \
            sh -
        '
      become: no
      tags: [mini-k3s]

    - name: Wait for k3s to be ready
      shell: |
        /opt/homebrew/bin/orb -m macmini sudo k3s kubectl get node {{ macmini_hostname }} --no-headers 2>/dev/null
      register: k3s_ready
      become: no
      retries: 30
      delay: 5
      until: k3s_ready.rc == 0 and 'Ready' in k3s_ready.stdout
      tags: [mini-k3s]

    - name: Show k3s node status
      debug:
        msg: "k3s node: {{ k3s_ready.stdout }}"
      tags: [mini-k3s]

    # ─── Summary ───────────────────────────────────────────────────────────
    - name: Display setup summary
      debug:
        msg: |
          ════════════════════════════════════════
          Mac Mini M4 Setup Summary
          ════════════════════════════════════════

          Host: {{ macmini_ip }}
          Role: k3s agent (workload node)
          k3s version: {{ k3s_version }}
          OrbStack VM: macmini (Ubuntu arm64)

          Labels:
            - longhorn.io/storage=true
            - macmini-agent=true

          Workloads planned:
            - Home Assistant
            - Pi-hole
            - Voice LLM

          Next steps:
            1. Verify node joined: kubectl get nodes
            2. Enable Longhorn scheduling on this node
            3. Pin workloads via nodeSelector: macmini-agent=true

          ════════════════════════════════════════
      tags: [mini-summary]
