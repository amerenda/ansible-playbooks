---
# Mac Mini M4 Setup Playbook
# Prepares the Mac Mini as a Docker host using OrbStack
# Services are managed by Komodo (GitOps for Docker Compose)
#
# Prerequisites:
#   - SSH access to the Mini (ssh mini)
#   - Passwordless sudo configured
#   - Xcode CLI Tools + Rosetta installed (run mac-mini-init.sh first on a fresh box)
#   - Bitwarden Secrets Manager secrets created (see group_vars/macmini_hosts.yml)
#
# Run:
#   ansible-playbook -i inventory/inventory.ini playbooks/infrastructure/setup-macmini.yml \
#     --extra-vars "bws_access_token=<YOUR_BWS_TOKEN>"
#
# Tags:
#   macmini         — Everything
#   mini-homebrew   — Install Homebrew + packages + OrbStack + Ollama
#   mini-system     — Hostname, timezone, energy settings
#   mini-orbstack   — Start and configure OrbStack
#   mini-ollama     — Install and start Ollama + pull default model
#   mini-secrets    — Fetch secrets from Bitwarden, write to disk
#   mini-komodo     — Clone compose repo, deploy Komodo, bootstrap GitOps
#   mini-tailscale  — Tailscale VPN setup
#   mini-bluebubbles — Install BlueBubbles iMessage proxy
#   mini-dns        — pf DNS redirect + socat UDP proxy for Technitium
#   mini-summary    — Show setup summary

- name: Setup Mac Mini M4 as Docker host
  hosts: macmini_hosts
  gather_facts: yes
  tags: [macmini]

  vars_files:
    - ../../group_vars/macmini_hosts.yml

  vars:
    target_user: "{{ ansible_user }}"
    macmini_hostname: "mac-mini-m4"
    homebrew_bin: /opt/homebrew/bin
    orbstack_bin: "/Users/{{ target_user }}/.orbstack/bin"
    compose_repo: "https://github.com/amerenda/mac-mini-compose.git"
    compose_dir: "/Users/{{ target_user }}/mac-mini-compose"
    komodo_dir: "/Users/{{ target_user }}/mac-mini-compose/komodo"

  tasks:
    # ─── Homebrew ──────────────────────────────────────────────────────────
    - name: Check if Homebrew is installed
      stat:
        path: "{{ homebrew_bin }}/brew"
      register: homebrew_check
      tags: [mini-homebrew]

    - name: Install Homebrew
      shell: |
        NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when: not homebrew_check.stat.exists
      become: no
      tags: [mini-homebrew]

    - name: Ensure Homebrew is in PATH (zprofile)
      lineinfile:
        path: "/Users/{{ target_user }}/.zprofile"
        line: 'eval "$(/opt/homebrew/bin/brew shellenv)"'
        create: yes
      become: no
      tags: [mini-homebrew]

    - name: Install Homebrew packages
      community.general.homebrew:
        name: "{{ homebrew_packages }}"
        state: present
      become: no
      tags: [mini-homebrew]

    - name: Install OrbStack
      community.general.homebrew_cask:
        name: orbstack
        state: present
      become: no
      tags: [mini-homebrew]

    # ─── Ollama (native, not Docker — needs Metal GPU) ────────────────────
    - name: Install Ollama
      community.general.homebrew:
        name: ollama
        state: present
      become: no
      tags: [mini-homebrew, mini-ollama]

    - name: Start Ollama service
      shell: "{{ homebrew_bin }}/brew services start ollama"
      environment:
        HOMEBREW_SERVICES_NO_DOMAIN_WARNING: "1"
      become: no
      changed_when: false
      tags: [mini-ollama]

    - name: Wait for Ollama to be ready
      shell: "curl -sf http://localhost:11434/api/tags > /dev/null 2>&1"
      register: ollama_ready
      become: no
      retries: 12
      delay: 5
      until: ollama_ready.rc == 0
      tags: [mini-ollama]

    - name: Pull default Ollama model for HA voice assistant
      shell: "{{ homebrew_bin }}/ollama pull llama3.1:8b"
      become: no
      register: ollama_pull
      changed_when: "'pulling' in ollama_pull.stdout"
      tags: [mini-ollama]

    # ─── System ────────────────────────────────────────────────────────────
    - name: Set timezone
      become: yes
      command: systemsetup -settimezone "{{ timezone }}"
      changed_when: false
      tags: [mini-system]

    - name: Set hostname
      become: yes
      shell: |
        scutil --set ComputerName "{{ macmini_hostname }}"
        scutil --set HostName "{{ macmini_hostname }}"
        scutil --set LocalHostName "{{ macmini_hostname }}"
      changed_when: false
      tags: [mini-system]

    - name: Disable sleep and display sleep
      become: yes
      command: pmset -a sleep 0 disablesleep 1 displaysleep 0
      changed_when: false
      tags: [mini-system]

    - name: Enable automatic restart on power loss
      become: yes
      command: pmset -a autorestart 1
      changed_when: false
      tags: [mini-system]

    - name: Disable screen saver
      become: no
      command: defaults -currentHost write com.apple.screensaver idleTime 0
      changed_when: false
      tags: [mini-system]

    # ─── OrbStack ─────────────────────────────────────────────────────────
    - name: Check if OrbStack is running
      shell: "{{ orbstack_bin }}/docker info > /dev/null 2>&1"
      register: orbstack_running
      failed_when: false
      changed_when: false
      become: no
      tags: [mini-orbstack]

    - name: Start OrbStack
      shell: "{{ homebrew_bin }}/orbctl start"
      when: orbstack_running.rc != 0
      become: no
      tags: [mini-orbstack]

    - name: Wait for Docker to be available
      shell: "{{ orbstack_bin }}/docker info > /dev/null 2>&1"
      register: docker_ready
      become: no
      retries: 12
      delay: 5
      until: docker_ready.rc == 0
      tags: [mini-orbstack]

    - name: Create OrbStack Docker config directory
      file:
        path: "/Users/{{ target_user }}/.orbstack/config"
        state: directory
        owner: "{{ target_user }}"
        mode: '0755'
      become: no
      tags: [mini-orbstack]

    - name: Configure Docker build cache limit (16GB)
      copy:
        content: |
          {
            "builder": {
              "gc": {
                "enabled": true,
                "defaultKeepStorage": "16gb"
              }
            }
          }
        dest: "/Users/{{ target_user }}/.orbstack/config/docker.json"
        owner: "{{ target_user }}"
        mode: '0644'
      become: no
      tags: [mini-orbstack]

    # ─── OrbStack LAN fix (workaround for host networking bug in v2.0.5) ──
    - name: Install OrbStack LAN bridge fix LaunchAgent
      copy:
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Label</key>
              <string>com.local.orbstack-lan-fix</string>
              <key>ProgramArguments</key>
              <array>
                  <string>/bin/bash</string>
                  <string>-c</string>
                  <string>
          # Wait for OrbStack to be running
          for i in $(seq 1 60); do
            /opt/homebrew/bin/orbctl status 2>/dev/null | grep -q Running &amp;&amp; break
            sleep 2
          done
          # Wait for Docker to be responsive
          for i in $(seq 1 30); do
            /Users/{{ target_user }}/.orbstack/bin/docker info >/dev/null 2>&amp;1 &amp;&amp; break
            sleep 2
          done
          # Test if LAN is already reachable from a container
          if /Users/{{ target_user }}/.orbstack/bin/docker run --rm --network host alpine ping -c 1 -W 3 10.100.20.1 >/dev/null 2>&amp;1; then
            exit 0
          fi
          # LAN broken — restart OrbStack
          /opt/homebrew/bin/orbctl stop
          sleep 5
          /opt/homebrew/bin/orbctl start
                  </string>
              </array>
              <key>RunAtLoad</key>
              <true/>
          </dict>
          </plist>
        dest: "/Users/{{ target_user }}/Library/LaunchAgents/com.local.orbstack-lan-fix.plist"
        owner: "{{ target_user }}"
        mode: '0644'
      become: no
      tags: [mini-orbstack]

    - name: Load OrbStack LAN fix LaunchAgent
      shell: "launchctl load /Users/{{ target_user }}/Library/LaunchAgents/com.local.orbstack-lan-fix.plist 2>/dev/null || true"
      become: no
      changed_when: false
      tags: [mini-orbstack]

    # ─── Komodo: Clone Repo ────────────────────────────────────────────
    - name: Check if mac-mini-compose repo exists
      stat:
        path: "{{ compose_dir }}/.git"
      register: compose_repo_check
      tags: [mini-komodo, mini-secrets, mini-dns]

    - name: Clone mac-mini-compose repo
      git:
        repo: "{{ compose_repo }}"
        dest: "{{ compose_dir }}"
        version: main
      become: no
      when: not compose_repo_check.stat.exists
      tags: [mini-komodo, mini-secrets, mini-dns]

    - name: Pull latest mac-mini-compose (stash local changes from secret injection)
      shell: "git -C {{ compose_dir }} stash && git -C {{ compose_dir }} pull --ff-only && git -C {{ compose_dir }} stash pop || true"
      become: no
      changed_when: false
      when: compose_repo_check.stat.exists
      tags: [mini-komodo, mini-secrets, mini-dns]

    # ─── Bitwarden Secrets ───────────────────────────────────────────────
    # All secret injection is handled by scripts/inject-secrets.sh in the
    # mac-mini-compose repo. This section installs prerequisites and runs
    # the script. The same script runs at boot via LaunchDaemon.
    #
    # Secret rotation: update in BWS → run inject-secrets.sh (or reboot).
    # Komodo deploys also refresh secrets via stacks.toml pre_deploy.

    - name: Validate bws_access_token is provided
      fail:
        msg: |
          bws_access_token must be provided. Run with:
            ansible-playbook ... --extra-vars "bws_access_token=<YOUR_BWS_TOKEN>"
      when: bws_access_token is not defined or bws_access_token == ""
      tags: [mini-secrets, mini-komodo]

    - name: Check if bws CLI is installed
      stat:
        path: /usr/local/bin/bws
      register: bws_check
      tags: [mini-secrets]

    - name: Download and install bws CLI
      shell: |
        curl -sL https://github.com/bitwarden/sdk-sm/releases/download/bws-v2.0.0/bws-aarch64-apple-darwin-2.0.0.zip -o /tmp/bws.zip
        unzip -o /tmp/bws.zip -d /tmp/bws-extract
        sudo mv /tmp/bws-extract/bws /usr/local/bin/bws
        sudo chmod +x /usr/local/bin/bws
        rm -rf /tmp/bws.zip /tmp/bws-extract
        /usr/local/bin/bws --version
      when: not bws_check.stat.exists
      become: no
      tags: [mini-secrets]

    - name: Write BWS access token to disk
      copy:
        content: "{{ bws_access_token }}"
        dest: "/Users/{{ target_user }}/.bws-secret"
        owner: "{{ target_user }}"
        mode: '0600'
      become: no
      no_log: true
      tags: [mini-secrets]

    - name: Create /etc/komodo directory
      file:
        path: /etc/komodo
        state: directory
        owner: "{{ target_user }}"
        mode: '0755'
      become: yes
      tags: [mini-secrets]

    - name: Install inject-secrets LaunchDaemon
      copy:
        src: "{{ compose_dir }}/launchd/com.local.inject-secrets.plist"
        dest: /Library/LaunchDaemons/com.local.inject-secrets.plist
        owner: root
        group: wheel
        mode: '0644'
        remote_src: yes
      become: yes
      tags: [mini-secrets]

    - name: Load inject-secrets LaunchDaemon
      shell: "launchctl load /Library/LaunchDaemons/com.local.inject-secrets.plist 2>/dev/null || true"
      become: yes
      changed_when: false
      tags: [mini-secrets]

    - name: Run inject-secrets.sh to populate all secrets
      shell: "bash {{ compose_dir }}/scripts/inject-secrets.sh"
      become: yes
      tags: [mini-secrets]

    - name: Fix ownership on compose directory after root-run script
      file:
        path: "{{ compose_dir }}"
        owner: "{{ target_user }}"
        group: staff
        recurse: no
      become: yes
      tags: [mini-secrets]

    # ─── Shared Docker network ────────────────────────────────────────────────
    - name: Create mac-mini-shared Docker network
      shell: "{{ orbstack_bin }}/docker network create mac-mini-shared 2>/dev/null || true"
      become: no
      changed_when: false
      tags: [mini-komodo]

    # ─── Komodo: Deploy ──────────────────────────────────────────────────
    - name: Create Komodo data directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        mode: '0755'
      loop:
        - /etc/komodo
        - /etc/komodo/backups
      become: yes
      tags: [mini-komodo]

    - name: Start Komodo stack
      shell: >
        {{ orbstack_bin }}/docker compose
        -p komodo
        -f {{ komodo_dir }}/compose.yaml
        --env-file {{ komodo_dir }}/compose.env
        up -d
      become: no
      tags: [mini-komodo]

    - name: Wait for Komodo Core to be ready
      shell: "curl -sf http://localhost:9120 > /dev/null 2>&1"
      register: komodo_ready
      become: no
      retries: 12
      delay: 5
      until: komodo_ready.rc == 0
      tags: [mini-komodo]

    # ─── Komodo: Bootstrap GitOps pipeline via API ────────────────────────
    - name: Read Komodo admin password from injected secret file
      slurp:
        src: "{{ komodo_dir }}/secrets/komodo-dean-admin-password"
      register: admin_pass_file
      no_log: true
      tags: [mini-komodo]

    - name: Set Komodo admin password fact
      set_fact:
        komodo_admin_password: "{{ admin_pass_file.content | b64decode }}"
      no_log: true
      tags: [mini-komodo]

    - name: Login to Komodo API
      uri:
        url: "http://localhost:9120/auth/login/LoginLocalUser"
        method: POST
        body_format: json
        body:
          username: admin
          password: "{{ komodo_admin_password }}"
        status_code: 200
      register: komodo_login
      no_log: true
      tags: [mini-komodo]

    - name: Set Komodo JWT
      set_fact:
        komodo_jwt: "{{ komodo_login.json.data.jwt }}"
      no_log: true
      tags: [mini-komodo]

    - name: List existing git provider accounts
      uri:
        url: "http://localhost:9120/read/ListGitProviderAccounts"
        method: POST
        body_format: json
        body: {}
        headers:
          Authorization: "{{ komodo_jwt }}"
        status_code: 200
      register: git_providers
      tags: [mini-komodo]

    - name: Read GITOPS_PAT from injected secret file
      slurp:
        src: /etc/komodo/runner-secrets/github-pat-k3s-dean-gitops
      register: gitops_pat_file
      no_log: true
      tags: [mini-komodo]

    - name: Set GITOPS_PAT fact
      set_fact:
        gitops_pat: "{{ gitops_pat_file.content | b64decode }}"
      no_log: true
      tags: [mini-komodo]

    - name: Create GitHub git provider account (first run)
      uri:
        url: "http://localhost:9120/write/CreateGitProviderAccount"
        method: POST
        body_format: json
        body:
          account:
            name: amerenda
            domain: github.com
            https: true
            username: amerenda
            token: "{{ gitops_pat }}"
        headers:
          Authorization: "{{ komodo_jwt }}"
        status_code: 200
      when: git_providers.json | length == 0
      no_log: true
      tags: [mini-komodo]

    - name: Update GitHub git provider PAT (subsequent runs)
      uri:
        url: "http://localhost:9120/write/UpdateGitProviderAccount"
        method: POST
        body_format: json
        body:
          id: "{{ git_providers.json[0]._id['$oid'] }}"
          account:
            domain: github.com
            https: true
            username: amerenda
            token: "{{ gitops_pat }}"
        headers:
          Authorization: "{{ komodo_jwt }}"
        status_code: 200
      when: git_providers.json | length > 0
      no_log: true
      tags: [mini-komodo]

    - name: Check for existing resource syncs
      uri:
        url: "http://localhost:9120/read/ListResourceSyncs"
        method: POST
        body_format: json
        body: {}
        headers:
          Authorization: "{{ komodo_jwt }}"
        status_code: 200
      register: resource_syncs
      tags: [mini-komodo]

    - name: Create ResourceSync for mac-mini-compose
      uri:
        url: "http://localhost:9120/write/CreateResourceSync"
        method: POST
        body_format: json
        body:
          name: mac-mini-compose
          config:
            repo: amerenda/mac-mini-compose
            branch: main
            resource_path:
              - "resource-sync/stacks.toml"
            git_account: amerenda
            git_provider: github.com
            git_https: true
        headers:
          Authorization: "{{ komodo_jwt }}"
        status_code: 200
      when: resource_syncs.json | length == 0
      tags: [mini-komodo]

    - name: Trigger initial resource sync
      uri:
        url: "http://localhost:9120/execute/RunSync"
        method: POST
        body_format: json
        body:
          sync: mac-mini-compose
        headers:
          Authorization: "{{ komodo_jwt }}"
        status_code: 200
      register: sync_result
      tags: [mini-komodo]

    - name: Wait for sync to complete
      uri:
        url: "http://localhost:9120/read/GetUpdate"
        method: POST
        body_format: json
        body:
          id: "{{ sync_result.json._id['$oid'] }}"
        headers:
          Authorization: "{{ komodo_jwt }}"
        status_code: 200
      register: sync_status
      until: sync_status.json.status == "Complete"
      retries: 24
      delay: 5
      tags: [mini-komodo]

    - name: Verify stacks are running
      uri:
        url: "http://localhost:9120/read/ListStacks"
        method: POST
        body_format: json
        body: {}
        headers:
          Authorization: "{{ komodo_jwt }}"
        status_code: 200
      register: stacks_status
      tags: [mini-komodo]

    - name: Display stack status
      debug:
        msg: "Stack '{{ item.name }}': state={{ item.info.state | default('deploying') }}"
      loop: "{{ stacks_status.json }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [mini-komodo]

    # ─── Tailscale ─────────────────────────────────────────────────────────
    - name: Check if Tailscale is running
      shell: "{{ homebrew_bin }}/tailscale status 2>&1"
      register: tailscale_status
      failed_when: false
      changed_when: false
      become: no
      tags: [mini-tailscale]

    - name: Start Tailscale daemon
      shell: "sudo {{ homebrew_bin }}/brew services start tailscale"
      environment:
        HOMEBREW_SERVICES_NO_DOMAIN_WARNING: "1"
      when: tailscale_status.rc != 0
      become: no
      tags: [mini-tailscale]

    - name: Show Tailscale status
      debug:
        msg: |
          Tailscale status: {{ tailscale_status.stdout_lines | default(['not running']) }}

          If not authenticated, SSH into the Mini and run:
            tailscale up --accept-routes --ssh
      tags: [mini-tailscale]

    # ─── BlueBubbles (iMessage proxy) ───────────────────────────────────────
    - name: Check if BlueBubbles is already installed
      stat:
        path: "/Applications/BlueBubbles.app"
      register: bluebubbles_check
      tags: [mini-bluebubbles]

    - name: Download BlueBubbles DMG
      get_url:
        url: "https://github.com/BlueBubblesApp/bluebubbles-server/releases/download/v{{ bluebubbles_version }}/BlueBubbles-{{ bluebubbles_version }}-arm64.dmg"
        dest: "/tmp/BlueBubbles.dmg"
        mode: '0644'
      become: no
      when: not bluebubbles_check.stat.exists
      tags: [mini-bluebubbles]

    - name: Mount BlueBubbles DMG
      shell: "hdiutil attach /tmp/BlueBubbles.dmg -nobrowse -noverify -noautoopen"
      register: dmg_mount
      become: no
      when: not bluebubbles_check.stat.exists
      tags: [mini-bluebubbles]

    - name: Copy BlueBubbles to Applications and clear quarantine
      shell: |
        cp -R "/Volumes/BlueBubbles {{ bluebubbles_version }}-arm64/BlueBubbles.app" /Applications/
        xattr -cr /Applications/BlueBubbles.app
        chown -R {{ target_user }}:staff /Applications/BlueBubbles.app
      become: yes
      when: not bluebubbles_check.stat.exists
      tags: [mini-bluebubbles]

    - name: Unmount BlueBubbles DMG and clean up
      shell: 'hdiutil detach "/Volumes/BlueBubbles {{ bluebubbles_version }}-arm64" || true; rm -f /tmp/BlueBubbles.dmg'
      become: no
      when: not bluebubbles_check.stat.exists
      tags: [mini-bluebubbles]

    - name: Add BlueBubbles to Login Items
      shell: >
        osascript -e 'tell application "System Events" to
        make login item at end with properties
        {path:"/Applications/BlueBubbles.app", hidden:false}'
      become: no
      register: login_item
      changed_when: "'exists' not in login_item.stderr"
      failed_when: false
      tags: [mini-bluebubbles]

    - name: Show BlueBubbles post-install steps
      debug:
        msg: |
          BlueBubbles installed to /Applications/BlueBubbles.app

          Manual steps required (connect via VNC to {{ macmini_ip }}:5900):
            1. Open BlueBubbles.app
            2. System Settings > Privacy & Security > Full Disk Access > add BlueBubbles
            3. Complete the setup wizard (set server password, skip proxy)
            4. Ensure iMessage is signed in via Messages.app

          Android: Install BlueBubbles from Google Play, connect to {{ macmini_ip }}:1234
      tags: [mini-bluebubbles]

    # ─── DNS / pf redirect + Python UDP proxy ─────────────────────────────
    # pf-dns-redirect.sh: redirects UDP DNS_PORT → LAN_IP:5355 (same IP,
    # unique port macOS delivers locally). dns-udp-proxy.py: listens on
    # :5355 and forwards UDP to OrbStack VM (192.168.139.2:5354/Technitium).
    # OrbStack already handles TCP on *:5354.
    # Cutover: set DNS_PORT=53 in pf-dns-redirect.sh when ready.

    - name: Enable IP forwarding persistently via /etc/sysctl.conf
      lineinfile:
        path: /etc/sysctl.conf
        line: "net.inet.ip.forwarding=1"
        create: yes
        owner: root
        group: wheel
        mode: '0644'
      become: yes
      tags: [mini-dns]

    - name: Enable IP forwarding immediately (runtime)
      command: sysctl -w net.inet.ip.forwarding=1
      become: yes
      changed_when: false
      tags: [mini-dns]

    - name: Install pf-dns-redirect LaunchDaemon
      copy:
        src: "{{ compose_dir }}/launchd/com.local.pf-dns-redirect.plist"
        dest: /Library/LaunchDaemons/com.local.pf-dns-redirect.plist
        owner: root
        group: wheel
        mode: '0644'
        remote_src: yes
      become: yes
      tags: [mini-dns]

    - name: Load pf-dns-redirect LaunchDaemon
      shell: |
        launchctl unload /Library/LaunchDaemons/com.local.pf-dns-redirect.plist 2>/dev/null || true
        launchctl load /Library/LaunchDaemons/com.local.pf-dns-redirect.plist
      become: yes
      changed_when: false
      tags: [mini-dns]

    - name: Install dns-udp-proxy LaunchDaemon
      copy:
        src: "{{ compose_dir }}/launchd/com.local.dns-udp-proxy.plist"
        dest: /Library/LaunchDaemons/com.local.dns-udp-proxy.plist
        owner: root
        group: wheel
        mode: '0644'
        remote_src: yes
      become: yes
      tags: [mini-dns]

    - name: Load dns-udp-proxy LaunchDaemon
      shell: |
        launchctl unload /Library/LaunchDaemons/com.local.socat-dns-proxy.plist 2>/dev/null || true
        launchctl unload /Library/LaunchDaemons/com.local.dns-udp-proxy.plist 2>/dev/null || true
        launchctl load /Library/LaunchDaemons/com.local.dns-udp-proxy.plist
      become: yes
      changed_when: false
      tags: [mini-dns]

    # ─── Summary ───────────────────────────────────────────────────────────
    - name: Display setup summary
      debug:
        msg: |
          ════════════════════════════════════════
          Mac Mini M4 Setup Summary
          ════════════════════════════════════════

          Host: {{ macmini_ip }}
          Hostname: {{ macmini_hostname }}
          Runtime: OrbStack (Docker)
