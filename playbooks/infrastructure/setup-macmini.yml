---
# Mac Mini M4 Setup Playbook
# Prepares the Mac Mini as a Docker host using OrbStack
# All services run as Docker containers via Docker Compose
#
# Prerequisites:
#   - SSH access to the Mini (ssh mini)
#   - Passwordless sudo configured
#   - Xcode CLI Tools + Rosetta installed (run mac-mini-init.sh first on a fresh box)
#
# Run:
#   ansible-playbook -i inventory/inventory.ini playbooks/infrastructure/setup-macmini.yml
#
# Tags:
#   macmini         — Everything
#   mini-homebrew   — Install Homebrew + packages + OrbStack
#   mini-system     — Hostname, timezone, energy settings
#   mini-orbstack   — Start and configure OrbStack
#   mini-compose    — Deploy docker-compose stack + auto-start
#   mini-tailscale  — Tailscale VPN setup
#   mini-summary    — Show setup summary

- name: Setup Mac Mini M4 as Docker host
  hosts: macmini_hosts
  gather_facts: yes
  tags: [macmini]

  vars_files:
    - ../../group_vars/macmini_hosts.yml

  vars:
    target_user: "{{ ansible_user }}"
    macmini_hostname: "mac-mini-m4"
    homebrew_bin: /opt/homebrew/bin
    services_dir: "/Users/{{ target_user }}/services"

  tasks:
    # ─── Homebrew ──────────────────────────────────────────────────────────
    - name: Check if Homebrew is installed
      stat:
        path: "{{ homebrew_bin }}/brew"
      register: homebrew_check
      tags: [mini-homebrew]

    - name: Install Homebrew
      shell: |
        NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when: not homebrew_check.stat.exists
      become: no
      tags: [mini-homebrew]

    - name: Ensure Homebrew is in PATH (zprofile)
      lineinfile:
        path: "/Users/{{ target_user }}/.zprofile"
        line: 'eval "$(/opt/homebrew/bin/brew shellenv)"'
        create: yes
      become: no
      tags: [mini-homebrew]

    - name: Install Homebrew packages
      community.general.homebrew:
        name: "{{ homebrew_packages }}"
        state: present
      become: no
      tags: [mini-homebrew]

    - name: Install OrbStack
      community.general.homebrew_cask:
        name: orbstack
        state: present
      become: no
      tags: [mini-homebrew]

    # ─── System ────────────────────────────────────────────────────────────
    - name: Set timezone
      become: yes
      command: systemsetup -settimezone "{{ timezone }}"
      changed_when: false
      tags: [mini-system]

    - name: Set hostname
      become: yes
      shell: |
        scutil --set ComputerName "{{ macmini_hostname }}"
        scutil --set HostName "{{ macmini_hostname }}"
        scutil --set LocalHostName "{{ macmini_hostname }}"
      changed_when: false
      tags: [mini-system]

    - name: Disable sleep and display sleep
      become: yes
      command: pmset -a sleep 0 disablesleep 1 displaysleep 0
      changed_when: false
      tags: [mini-system]

    - name: Disable automatic restart on power loss (optional)
      become: yes
      command: pmset -a autorestart 1
      changed_when: false
      tags: [mini-system]

    - name: Disable screen saver
      become: no
      command: defaults -currentHost write com.apple.screensaver idleTime 0
      changed_when: false
      tags: [mini-system]

    # ─── OrbStack ─────────────────────────────────────────────────────────
    - name: Check if OrbStack is running
      shell: "{{ homebrew_bin }}/docker info > /dev/null 2>&1"
      register: orbstack_running
      failed_when: false
      changed_when: false
      become: no
      tags: [mini-orbstack]

    - name: Start OrbStack
      shell: open -a OrbStack && sleep 5
      when: orbstack_running.rc != 0
      become: no
      tags: [mini-orbstack]

    - name: Wait for Docker to be available
      shell: "{{ homebrew_bin }}/docker info > /dev/null 2>&1"
      register: docker_ready
      become: no
      retries: 12
      delay: 5
      until: docker_ready.rc == 0
      tags: [mini-orbstack]

    - name: Verify Docker is working
      shell: "{{ homebrew_bin }}/docker run --rm hello-world 2>&1 | head -5"
      register: docker_test
      become: no
      changed_when: false
      tags: [mini-orbstack]

    - name: Show Docker status
      debug:
        msg: "{{ docker_test.stdout_lines }}"
      tags: [mini-orbstack]

    # ─── Docker Compose Stack ─────────────────────────────────────────────
    - name: Create services directory
      file:
        path: "{{ services_dir }}"
        state: directory
        owner: "{{ target_user }}"
        mode: '0755'
      become: no
      tags: [mini-compose]

    - name: Deploy docker-compose.yaml
      copy:
        content: |
          services:
            homeassistant:
              image: ghcr.io/home-assistant/home-assistant:{{ ha_version }}
              container_name: homeassistant
              restart: unless-stopped
              network_mode: host
              environment:
                TZ: "{{ timezone }}"
              volumes:
                - ha-config:/config
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:8123/api/"]
                interval: 30s
                timeout: 10s
                retries: 5
                start_period: 120s

            node-exporter:
              image: prom/node-exporter:latest
              container_name: node-exporter
              restart: unless-stopped
              ports:
                - "9100:9100"
              command:
                - '--path.rootfs=/host'
                - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
              volumes:
                - /:/host:ro,rslave
              pid: host

          volumes:
            ha-config:
        dest: "{{ services_dir }}/docker-compose.yaml"
        owner: "{{ target_user }}"
        mode: '0644'
      become: no
      tags: [mini-compose]

    - name: Start Docker Compose stack
      shell: "{{ homebrew_bin }}/docker compose -f {{ services_dir }}/docker-compose.yaml up -d"
      become: no
      tags: [mini-compose]

    - name: Create services auto-start LaunchAgent
      copy:
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>Label</key>
            <string>com.amerenda.services</string>
            <key>ProgramArguments</key>
            <array>
              <string>/bin/bash</string>
              <string>-c</string>
              <string>sleep 30 &amp;&amp; {{ homebrew_bin }}/docker compose -f {{ services_dir }}/docker-compose.yaml up -d</string>
            </array>
            <key>RunAtLoad</key>
            <true/>
            <key>StandardOutPath</key>
            <string>/tmp/services-start.log</string>
            <key>StandardErrorPath</key>
            <string>/tmp/services-start.err</string>
          </dict>
          </plist>
        dest: "/Users/{{ target_user }}/Library/LaunchAgents/com.amerenda.services.plist"
        owner: "{{ target_user }}"
        mode: '0644'
      become: no
      tags: [mini-compose]

    - name: Load services LaunchAgent
      shell: launchctl load ~/Library/LaunchAgents/com.amerenda.services.plist 2>/dev/null || true
      become: no
      changed_when: false
      tags: [mini-compose]

    # ─── Tailscale ─────────────────────────────────────────────────────────
    - name: Check if Tailscale is running
      shell: "{{ homebrew_bin }}/tailscale status 2>&1"
      register: tailscale_status
      failed_when: false
      changed_when: false
      become: no
      tags: [mini-tailscale]

    - name: Start Tailscale daemon
      shell: "sudo {{ homebrew_bin }}/brew services start tailscale"
      environment:
        HOMEBREW_SERVICES_NO_DOMAIN_WARNING: "1"
      when: tailscale_status.rc != 0
      become: no
      tags: [mini-tailscale]

    - name: Show Tailscale status
      debug:
        msg: |
          Tailscale status: {{ tailscale_status.stdout_lines | default(['not running']) }}

          If not authenticated, SSH into the Mini and run:
            tailscale up --accept-routes --ssh
      tags: [mini-tailscale]

    # ─── Summary ───────────────────────────────────────────────────────────
    - name: Display setup summary
      debug:
        msg: |
          ════════════════════════════════════════
          Mac Mini M4 Setup Summary
          ════════════════════════════════════════

          Host: {{ macmini_ip }}
          Hostname: {{ macmini_hostname }}
          Runtime: OrbStack (Docker)
          Services dir: {{ services_dir }}

          Containers:
            - Home Assistant ({{ ha_version }})
            - node-exporter

          Manual steps remaining:
            1. Enable auto-login: System Settings > Users & Groups > Automatic Login
            2. If Tailscale not authenticated: ssh mini && tailscale up --accept-routes --ssh
            3. Verify HA: http://{{ macmini_ip }}:8123

          ════════════════════════════════════════
      tags: [mini-summary]
