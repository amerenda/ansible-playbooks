---
# Migrate etcd data directory to tmpfs (RAM disk) on k3s controllers
#
# SD cards have poor random I/O, causing etcd performance warnings.
# This playbook mounts tmpfs at the etcd data dir so etcd runs in RAM,
# with frequent snapshots written to persistent storage (SD card).
#
# SAFETY: serial: 1 ensures only one node restarts at a time,
#         preserving etcd quorum throughout the migration.
#
# Usage:
#   # Migrate all controllers (one at a time):
#   ansible-playbook -i inventory/inventory.ini playbooks/infrastructure/etcd-tmpfs.yml
#
#   # Migrate a specific controller:
#   ansible-playbook -i inventory/inventory.ini playbooks/infrastructure/etcd-tmpfs.yml --limit rpi4-0
#
# IMPORTANT: Do NOT run on the first controller (cluster-init node) first.
#   Start with non-init nodes so there is always a stable peer to rejoin from.
#   Recommended order: rpi4-0, rpi5-1, rpi5-0 (first controller last).
#
# After running, etcd data lives in RAM. On reboot, the node rejoins
# from peers (no restore needed). For full cluster power loss, use
# ~/restore-k3s.sh on one node.

- name: Migrate etcd to tmpfs on k3s controllers
  hosts: controllers
  become: yes
  gather_facts: yes
  serial: 1
  tags: [k3s, etcd, tmpfs]

  vars:
    k3s_config_path: /etc/rancher/k3s/config.yaml
    k3s_data_dir: /var/lib/rancher/k3s
    etcd_data_dir: /var/lib/rancher/k3s/server/db
    etcd_mount_dir: /var/lib/rancher/k3s/server/db/etcd
    snapshot_dir: /var/lib/rancher/k3s/server/db/snapshots
    tmpfs_size: "1G"
    etcd_version: "v3.5.21"
    etcdctl_path: /tmp/etcdctl
    etcd_certs: >-
      --endpoints=https://127.0.0.1:2379
      --cert=/var/lib/rancher/k3s/server/tls/etcd/server-client.crt
      --key=/var/lib/rancher/k3s/server/tls/etcd/server-client.key
      --cacert=/var/lib/rancher/k3s/server/tls/etcd/server-ca.crt

    # Variables needed by the k3s server config template
    cluster_cidr: "10.42.0.0/16"
    service_cidr: "10.43.0.0/16"
    cluster_dns: "10.43.0.10"
    etcd_snapshot_schedule: "*/5 * * * *"
    etcd_snapshot_retention: 12
    etcd_snapshot_compress: true
    controller_ips: "{{ groups['controllers'] | map('extract', hostvars, 'ansible_host') | list }}"
    first_controller: "{{ groups['controllers'][0] }}"
    is_first_controller: "{{ inventory_hostname == first_controller }}"

    # Pick a peer to rejoin from (used for etcdctl and for server: line)
    peer_node: "{{ groups['controllers'] | difference([inventory_hostname]) | first }}"
    peer_ip: "{{ hostvars[peer_node]['ansible_host'] }}"

    # Designated restore node for full power loss (most RAM = best candidate)
    restore_node: "rpi5-1"

  pre_tasks:
    - name: SAFETY — refuse to run on multiple hosts simultaneously
      assert:
        that:
          - ansible_play_hosts | length == 1 or serial is defined
        fail_msg: |
          =============================================
          REFUSING TO RUN ON MULTIPLE HOSTS AT ONCE!
          =============================================
          Restarting multiple etcd members simultaneously
          will break quorum and take down the cluster.
          =============================================
      run_once: false

    - name: Check if tmpfs is already mounted on etcd data dir
      shell: mountpoint -q {{ etcd_mount_dir }} && echo "mounted" || echo "not_mounted"
      register: tmpfs_check
      changed_when: false

    - name: Show current mount status
      debug:
        msg: "{{ inventory_hostname }}: etcd data dir is {{ tmpfs_check.stdout }}"

    - name: Verify k3s API health before changes
      uri:
        url: "https://{{ ansible_host }}:6443/healthz"
        method: GET
        validate_certs: no
        status_code: [200, 401]
        timeout: 10
      register: api_health_before

    - name: Show API health
      debug:
        msg: "k3s API on {{ inventory_hostname }}: {{ api_health_before.status }}"

  tasks:
    # --- fstab ---

    - name: Add tmpfs entry to fstab
      lineinfile:
        path: /etc/fstab
        regexp: '^\s*tmpfs\s+{{ etcd_mount_dir }}'
        line: "tmpfs {{ etcd_mount_dir }} tmpfs nodev,nosuid,size={{ tmpfs_size }} 0 0"
        state: present

    # --- k3s config: render full template ---
    # CRITICAL: The full config template must be rendered, not just lineinfile edits.
    # Without token/server/flannel-backend, k3s falls back to standalone kine/SQLite
    # mode when the etcd data dir is empty, instead of rejoining the etcd cluster.

    - name: Read k3s token from existing config
      shell: >-
        grep '^token:' {{ k3s_config_path }} | head -1 |
        sed 's/^token: *//' | tr -d '"'
      register: existing_token
      changed_when: false
      failed_when: false

    - name: Read k3s token from server token file (fallback)
      slurp:
        src: /var/lib/rancher/k3s/server/token
      register: token_file
      when: existing_token.stdout | default('') | length == 0

    - name: Set k3s_token fact
      set_fact:
        k3s_token: >-
          {{ existing_token.stdout if (existing_token.stdout | default('') | length > 0)
             else (token_file.content | b64decode | trim) }}

    - name: Render full k3s server config from template
      template:
        src: templates/k3s-server-config.yaml.j2
        dest: "{{ k3s_config_path }}"
        owner: root
        group: root
        mode: "0644"
      register: config_changed

    # CRITICAL: For the first controller, the template omits the server: line
    # (it's the cluster-init node). But for tmpfs migration, ALL nodes need
    # server: to rejoin from peers. Add it if missing.
    - name: Ensure server line exists for cluster rejoin
      lineinfile:
        path: "{{ k3s_config_path }}"
        regexp: '^server:'
        line: 'server: "https://{{ peer_ip }}:6443"'
        insertafter: '^# Cluster configuration'
      when: is_first_controller | bool

    # --- Take a snapshot before making changes ---

    - name: Take etcd snapshot before migration
      shell: >-
        k3s etcd-snapshot save --name pre-tmpfs-migration-{{ inventory_hostname }}
      when: tmpfs_check.stdout == "not_mounted"

    # --- Stop k3s, remove stale member, mount tmpfs, start k3s ---

    - name: CONFIRM — Migrate {{ inventory_hostname }} to tmpfs?
      pause:
        prompt: |

          About to stop k3s on {{ inventory_hostname }} ({{ ansible_host }}),
          mount tmpfs ({{ tmpfs_size }}) at {{ etcd_mount_dir }},
          and restart. etcd will rejoin from {{ peer_node }} ({{ peer_ip }}).

          Press ENTER to continue, or Ctrl+C then A to abort.
      when: tmpfs_check.stdout == "not_mounted"

    - name: Stop k3s
      systemd:
        name: k3s
        state: stopped
      when: tmpfs_check.stdout == "not_mounted"

    # --- Remove stale etcd member from a peer ---
    # When etcd data dir is wiped (tmpfs mount hides old data), the cluster
    # still has this node registered. k3s fails with "duplicate node name"
    # unless we remove the old member first. We run etcdctl on a peer node.

    - name: Download etcdctl on peer (if not present)
      delegate_to: "{{ peer_node }}"
      shell: |
        if [ -x {{ etcdctl_path }} ]; then
          echo "already present"
          exit 0
        fi
        ARCH=$(uname -m)
        case $ARCH in
          aarch64) ARCH=arm64 ;;
          x86_64) ARCH=amd64 ;;
        esac
        curl -sL "https://github.com/etcd-io/etcd/releases/download/{{ etcd_version }}/etcd-{{ etcd_version }}-linux-${ARCH}.tar.gz" \
          | tar xz --strip-components=1 -C /tmp "etcd-{{ etcd_version }}-linux-${ARCH}/etcdctl"
      when: tmpfs_check.stdout == "not_mounted"

    - name: Get etcd member ID for this node
      delegate_to: "{{ peer_node }}"
      shell: >-
        ETCDCTL_API=3 {{ etcdctl_path }} {{ etcd_certs }}
        member list -w simple | grep '{{ ansible_host }}' | cut -d',' -f1 || true
      register: stale_member_id
      when: tmpfs_check.stdout == "not_mounted"

    - name: Remove stale etcd member for this node
      delegate_to: "{{ peer_node }}"
      shell: >-
        ETCDCTL_API=3 {{ etcdctl_path }} {{ etcd_certs }}
        member remove {{ stale_member_id.stdout }}
      register: member_removal
      when:
        - tmpfs_check.stdout == "not_mounted"
        - stale_member_id.stdout | default('') | length > 0

    - name: Show member removal result
      debug:
        msg: "{{ member_removal.stdout | default('No stale member found — skipped') }}"
      when: tmpfs_check.stdout == "not_mounted"

    # --- Clean up and mount tmpfs ---

    - name: Remove stale kine state.db (prevents SQLite fallback)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ etcd_data_dir }}/state.db"
        - "{{ etcd_data_dir }}/state.db-wal"
        - "{{ etcd_data_dir }}/state.db-shm"
      when: tmpfs_check.stdout == "not_mounted"

    - name: Mount tmpfs at etcd data dir
      mount:
        path: "{{ etcd_mount_dir }}"
        src: tmpfs
        fstype: tmpfs
        opts: "nodev,nosuid,size={{ tmpfs_size }}"
        state: mounted
      when: tmpfs_check.stdout == "not_mounted"

    - name: Start k3s
      systemd:
        name: k3s
        state: started
      when: tmpfs_check.stdout == "not_mounted"

    # --- Restart k3s if only config changed (tmpfs already mounted) ---

    - name: Restart k3s for config changes
      systemd:
        name: k3s
        state: restarted
      when:
        - tmpfs_check.stdout == "mounted"
        - config_changed is changed

    # --- Verification ---

    - name: Wait for k3s API to come back
      uri:
        url: "https://{{ ansible_host }}:6443/healthz"
        method: GET
        validate_certs: no
        status_code: [200, 401]
        timeout: 10
      register: k3s_health
      until: k3s_health.status in [200, 401]
      retries: 60
      delay: 10

    - name: Show API health after migration
      debug:
        msg: "k3s API on {{ inventory_hostname }}: {{ k3s_health.status }}"

    - name: Verify tmpfs is mounted
      shell: df -h {{ etcd_mount_dir }} | tail -1
      register: df_output
      changed_when: false

    - name: Show tmpfs status
      debug:
        msg: "{{ inventory_hostname }}: {{ df_output.stdout }}"

    # --- Deploy recovery script ---

    - name: Deploy restore-k3s.sh to home directory
      copy:
        dest: /home/alex/restore-k3s.sh
        owner: alex
        group: alex
        mode: "0755"
        content: |
          #!/bin/bash
          set -euo pipefail

          # restore-k3s.sh — Restore k3s etcd from snapshot after full cluster power loss
          #
          # Use this ONLY when all 3 control plane nodes lost power simultaneously
          # and etcd cannot form quorum (all tmpfs mounts are empty, no peers available).
          #
          # Run on ONE node only. Then start k3s on the other nodes normally.
          #
          # Prerequisites:
          #   - k3s must be stopped on ALL control plane nodes
          #   - Run this on the node with the most recent snapshots

          SNAPSHOT_DIR="{{ snapshot_dir }}"
          ETCD_MOUNT="{{ etcd_mount_dir }}"
          CONFIG="/etc/rancher/k3s/config.yaml"
          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          NC='\033[0m'

          echo -e "${YELLOW}=== k3s etcd Snapshot Restore ===${NC}"
          echo ""

          # Check if k3s is running
          if systemctl is-active --quiet k3s; then
              echo -e "${RED}ERROR: k3s is currently running. Stop it first:${NC}"
              echo "  sudo systemctl stop k3s"
              exit 1
          fi

          # Find latest snapshot
          LATEST=$(ls -t "${SNAPSHOT_DIR}"/etcd-snapshot-* 2>/dev/null | head -1)

          if [ -z "$LATEST" ]; then
              echo -e "${RED}ERROR: No snapshots found in ${SNAPSHOT_DIR}${NC}"
              exit 1
          fi

          echo "Latest snapshot: ${LATEST}"
          echo "  Modified: $(stat -c '%y' "$LATEST")"
          echo "  Size: $(du -h "$LATEST" | cut -f1)"
          echo ""

          # Confirm
          read -p "Restore from this snapshot? This will reset the cluster. [y/N] " -n 1 -r
          echo ""
          if [[ ! $REPLY =~ ^[Yy]$ ]]; then
              echo "Aborted."
              exit 0
          fi

          # Step 1: Unmount tmpfs (cluster-reset renames the etcd dir, fails on mounted tmpfs)
          if mountpoint -q "$ETCD_MOUNT"; then
              echo -e "${YELLOW}Unmounting tmpfs at ${ETCD_MOUNT}...${NC}"
              sudo umount "$ETCD_MOUNT"
          fi

          # Step 2: Comment out server: line (cluster-reset refuses with it set)
          if grep -q '^server:' "$CONFIG"; then
              echo -e "${YELLOW}Temporarily commenting out server: line in config...${NC}"
              sudo sed -i 's/^server:/#RESTORE_TEMP#server:/' "$CONFIG"
              RESTORE_SERVER_LINE=true
          fi

          # Step 3: Run cluster-reset
          echo ""
          echo -e "${YELLOW}Running cluster-reset with snapshot restore...${NC}"
          sudo k3s server --cluster-reset --cluster-reset-restore-path="$LATEST"

          # Step 4: Re-enable server: line
          if [ "${RESTORE_SERVER_LINE:-}" = "true" ]; then
              echo -e "${YELLOW}Re-enabling server: line in config...${NC}"
              sudo sed -i 's/^#RESTORE_TEMP#server:/server:/' "$CONFIG"
          fi

          # Step 5: Remount tmpfs and copy restored data in
          echo -e "${YELLOW}Copying restored etcd data into tmpfs...${NC}"
          sudo cp -a "$ETCD_MOUNT" /tmp/etcd-restored
          sudo mount "$ETCD_MOUNT"
          sudo cp -a /tmp/etcd-restored/. "$ETCD_MOUNT/"
          sudo rm -rf /tmp/etcd-restored
          # Clean up the old etcd dir left by cluster-reset
          sudo rm -rf "${ETCD_MOUNT}-old-"* 2>/dev/null

          echo ""
          echo -e "${GREEN}Restore complete.${NC}"
          echo ""
          echo "Next steps:"
          echo "  1. Start k3s on THIS node:"
          echo "     sudo systemctl start k3s"
          echo ""
          echo "  2. Wait for it to be healthy:"
          echo "     sudo k3s kubectl get nodes"
          echo ""
          echo "  3. On the OTHER control plane nodes, just start k3s:"
          echo "     sudo systemctl start k3s"
          echo "     (They will rejoin from this node automatically)"
          echo ""

    - name: Confirm migration complete
      debug:
        msg: "{{ inventory_hostname }} — etcd running on tmpfs ({{ tmpfs_size }}), snapshots every 5min to SD card, restore script at ~/restore-k3s.sh"
