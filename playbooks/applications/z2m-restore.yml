---
# Zigbee2MQTT database restore
# Restores database.db from a backup on mac-mini-m4 and restarts Z2M.
# All backups live at ~/backups/z2m/ on mac-mini-m4.
#
# Usage:
#   # List available backups and restore latest (default):
#   ansible-playbook -i inventory/inventory.ini playbooks/applications/z2m-restore.yml
#
#   # Restore a specific timestamp:
#   ansible-playbook -i inventory/inventory.ini playbooks/applications/z2m-restore.yml \
#     -e backup_file=20260531-120000
#
#   # Restore golden (permanent snapshot):
#   ansible-playbook -i inventory/inventory.ini playbooks/applications/z2m-restore.yml \
#     -e backup_file=golden

- name: Restore Z2M database
  hosts: macmini_hosts
  gather_facts: false
  become: false

  vars:
    docker_bin: /Users/alex/.orbstack/bin/docker
    z2m_db_path: /Users/alex/komodo/stacks/automation/mac-mini-m4/zigbee2mqtt/z2m-data/database.db
    backup_dir: /Users/alex/backups/z2m
    # backup_file: latest (default) | golden | YYYYMMDD-HHMMSS | database.db.YYYYMMDD-HHMMSS
    backup_file: latest

  tasks:
    - name: List available backups
      shell: ls -lht {{ backup_dir }}/ 2>/dev/null || echo "(backup dir empty or missing)"
      register: backups_list
      failed_when: false

    - name: Show available backups
      debug:
        var: backups_list.stdout_lines

    - name: Resolve backup file path
      shell: |
        case "{{ backup_file }}" in
          latest)
            target=$(readlink {{ backup_dir }}/database.db.latest 2>/dev/null) || \
              { echo "ERROR: no latest symlink found" >&2; exit 1; }
            echo {{ backup_dir }}/$target
            ;;
          golden)
            echo {{ backup_dir }}/database.db.golden
            ;;
          database.db.*)
            echo {{ backup_dir }}/{{ backup_file }}
            ;;
          *)
            echo {{ backup_dir }}/database.db.{{ backup_file }}
            ;;
        esac
      register: resolved_path

    - name: Check resolved backup file exists
      stat:
        path: "{{ resolved_path.stdout | trim }}"
      register: backup_stat

    - name: Fail if backup file not found
      fail:
        msg: "Backup file not found: {{ resolved_path.stdout | trim }}"
      when: not backup_stat.stat.exists

    - name: Confirm which backup will be restored
      debug:
        msg: "Restoring: {{ resolved_path.stdout | trim }} ({{ backup_stat.stat.size }} bytes)"

    - name: Save pre-restore snapshot
      command: >
        cp {{ z2m_db_path }} {{ backup_dir }}/database.db.pre-restore
      failed_when: false

    - name: Copy backup to Z2M data dir
      copy:
        src: "{{ resolved_path.stdout | trim }}"
        dest: "{{ z2m_db_path }}"
        remote_src: true
        mode: "0644"

    - name: Check Z2M container is running
      command: "{{ docker_bin }} inspect --format={{ '{{.State.Running}}' }} zigbee2mqtt"
      register: z2m_running
      failed_when: false

    - name: Warn if Z2M not running
      debug:
        msg: "WARNING: Z2M container not running — database restored but container not restarted"
      when: z2m_running.rc != 0 or z2m_running.stdout != 'true'

    - name: Restart Z2M container
      command: "{{ docker_bin }} restart zigbee2mqtt"
      when: z2m_running.rc == 0 and z2m_running.stdout == 'true'

    - name: Wait for Z2M to come back up
      command: "{{ docker_bin }} inspect --format={{ '{{.State.Running}}' }} zigbee2mqtt"
      register: z2m_status
      until: z2m_status.stdout == 'true'
      retries: 15
      delay: 4
      when: z2m_running.rc == 0 and z2m_running.stdout == 'true'

    - name: Check Z2M startup logs
      command: "{{ docker_bin }} logs --tail=8 zigbee2mqtt"
      register: z2m_logs
      when: z2m_running.rc == 0 and z2m_running.stdout == 'true'
      failed_when: false

    - name: Show Z2M startup logs
      debug:
        var: z2m_logs.stdout_lines
      when: z2m_logs is defined and z2m_logs.stdout_lines is defined

    - name: Report
      debug:
        msg: "Restored {{ resolved_path.stdout | trim }} → {{ z2m_db_path }}. Z2M restarted."
      when: z2m_running.rc == 0 and z2m_running.stdout == 'true'
