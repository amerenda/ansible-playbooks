---
# Post k3s Setup - Configure cluster components
# Run after: ansible-playbook -i inventory.ini setup-k3s-cluster.yml
# Then run: ansible-playbook -i inventory.ini post-k3s-setup.yml

- name: Post k3s Setup - Configure cluster
  hosts: localhost  # Run locally to access kubeconfig
  become: no
  gather_facts: yes
  connection: local
  tags: [post-setup, longhorn, taints]

  vars:
    local_user: "{{ lookup('env', 'USER') }}"
    kubeconfig_path: "/home/{{ local_user }}/.kube/config"
    gitops_repo: "https://github.com/amerenda/k3s-dean-gitops.git"
    gitops_local_path: "/tmp/k3s-dean-gitops"
    k3s_runners_repo: "https://github.com/amerenda/k3s-runners.git"
    k3s_runners_local_path: "/tmp/k3s-runners"
    # ArgoCD settings (must match k3s-controller.yml)
    argocd_release_name: "argocd"
    argocd_namespace: "default"
    argocd_version: "7.8.13"
    # This playbook runs on localhost, so is_first_controller is always true
    is_first_controller: true
    # BWS-fetched secrets (set by fetch-secrets.yml when run via all.yml)
    argocd_repo_pat: "{{ hostvars['localhost']['fetched_secrets']['argocd_repo_pat'] | default('') }}"

  pre_tasks:
    - name: Check if kubeconfig exists
      stat:
        path: "{{ kubeconfig_path }}"
      register: kubeconfig_check

    - name: Fail if kubeconfig is missing
      fail:
        msg: "kubeconfig not found at {{ kubeconfig_path }}. Run setup-k3s-cluster.yml first."
      when: not kubeconfig_check.stat.exists

  tasks:
    - name: Set KUBECONFIG environment variable
      set_fact:
        kubeconfig_env: "KUBECONFIG={{ kubeconfig_path }}"

    - name: Check if all nodes are ready
      shell: "{{ kubeconfig_env }} kubectl get nodes --no-headers | grep -v Ready"
      register: not_ready_nodes
      failed_when: false
      tags: [wait, nodes]

    - name: Display cluster nodes
      shell: "{{ kubeconfig_env }} kubectl get nodes -o wide"
      register: cluster_nodes
      changed_when: false
      tags: [info, nodes]

    - name: Show cluster nodes
      debug:
        var: cluster_nodes.stdout_lines
      tags: [info, nodes]

    - name: Add ArgoCD Helm repository
      kubernetes.core.helm_repository:
        name: argo
        repo_url: https://argoproj.github.io/argo-helm
      when: is_first_controller
      delegate_to: localhost
      become: no
      remote_user: "{{ local_user }}"
      tags: [argocd, helm]

    - name: Install ArgoCD
      kubernetes.core.helm:
        name: "{{ argocd_release_name }}"
        chart_ref: argo/argo-cd
        release_namespace: "{{ argocd_namespace }}"
        create_namespace: false
        chart_version: "{{ argocd_version }}"
        kubeconfig: "/home/{{ local_user }}/.kube/config"
        values_files:
          - "{{ gitops_local_path }}/bootstrap/argocd/values.yaml"
        wait: true
        timeout: 300s
      when: is_first_controller
      delegate_to: localhost
      become: no
      remote_user: "{{ local_user }}"
      tags: [argocd, helm]

    - name: Wait for ArgoCD to be ready
      shell: |
        kubectl --kubeconfig="/home/{{ local_user }}/.kube/config" get pods -n "{{ argocd_namespace }}" -l "app.kubernetes.io/name=argocd-server" -o jsonpath='{.items[0].status.phase}' | grep -q "Running"
      register: argocd_ready
      until: argocd_ready.rc == 0
      retries: 30
      delay: 10
      when: is_first_controller
      delegate_to: localhost
      become: no
      remote_user: "{{ local_user }}"
      tags: [argocd, wait]

    - name: Clone gitops repo
      git:
        repo: "{{ gitops_repo }}"
        dest: "{{ gitops_local_path }}"
        version: main
        force: yes
      delegate_to: localhost
      become: no
      tags: [argocd, bootstrap]

    - name: Clone k3s-runners repo
      git:
        repo: "{{ k3s_runners_repo }}"
        dest: "{{ k3s_runners_local_path }}"
        version: main
        force: yes
      delegate_to: localhost
      become: no
      tags: [runners, bootstrap]

    - name: Apply ArgoCD AppProjects
      shell: |
        kubectl --kubeconfig="/home/{{ local_user }}/.kube/config" apply -f "{{ gitops_local_path }}/bootstrap/appprojects.yaml"
      when: is_first_controller
      delegate_to: localhost
      become: no
      remote_user: "{{ local_user }}"
      tags: [argocd, projects, bootstrap]

    - name: Create ArgoCD repo secret from BWS
      shell: |
        kubectl --kubeconfig="/home/{{ local_user }}/.kube/config" apply -f - <<'EOF'
        apiVersion: v1
        kind: Secret
        metadata:
          name: repo-k3s-dean-gitops
          namespace: default
          labels:
            argocd.argoproj.io/secret-type: repository
        type: Opaque
        stringData:
          type: git
          url: https://github.com/amerenda/k3s-dean-gitops.git
          username: amerenda
          password: "{{ argocd_repo_pat }}"
        EOF
      when:
        - is_first_controller
        - argocd_repo_pat | length > 0
      delegate_to: localhost
      become: no
      remote_user: "{{ local_user }}"
      no_log: true
      tags: [argocd, secrets, bootstrap]

    - name: Warn if ArgoCD repo PAT not available from BWS
      ansible.builtin.debug:
        msg: |
          ArgoCD repo secret NOT created — argocd_repo_pat not fetched from BWS.
          Run via all.yml with -e bws_access_token=<TOKEN>, or apply manually:
            kubectl apply -f bootstrap/argocd-repo-secret.yaml
      when: argocd_repo_pat | length == 0
      tags: [argocd, secrets, bootstrap]

    - name: Create Bitwarden credentials secret for ESO
      shell: |
        kubectl --kubeconfig="/home/{{ local_user }}/.kube/config" apply -f - <<'EOF'
        apiVersion: v1
        kind: Secret
        metadata:
          name: bitwarden-credentials
          namespace: default
        type: Opaque
        stringData:
          access-token: "{{ bws_access_token }}"
        EOF
      when:
        - is_first_controller
        - bws_access_token is defined
        - bws_access_token | length > 0
      delegate_to: localhost
      become: no
      remote_user: "{{ local_user }}"
      no_log: true
      tags: [argocd, secrets, bootstrap]

    - name: Warn if BWS access token not available for ESO
      ansible.builtin.debug:
        msg: |
          Bitwarden credentials secret NOT created — bws_access_token not provided.
          Run with -e bws_access_token=<TOKEN>, or apply manually:
            kubectl apply -f bootstrap/bitwarden-credentials-secret.yaml
      when: bws_access_token is not defined or bws_access_token | default('') | length == 0
      tags: [argocd, secrets, bootstrap]

    - name: Build and push kaniko runner image
      shell: |
        cd "{{ k3s_runners_local_path }}"
        docker build -t amerenda/k3s-runners:kaniko ./kaniko
        docker push amerenda/k3s-runners:kaniko
      delegate_to: localhost
      become: no
      remote_user: "{{ local_user }}"
      tags: [runners, kaniko, bootstrap]
      ignore_errors: yes  # Non-fatal if Docker Hub auth isn't set up yet

    - name: Apply root-app.yaml to bootstrap GitOps
      shell: |
        kubectl --kubeconfig="/home/{{ local_user }}/.kube/config" apply -f "{{ gitops_local_path }}/root-app.yaml"
      when: is_first_controller
      delegate_to: localhost
      become: no
      remote_user: "{{ local_user }}"
      tags: [argocd, gitops, bootstrap]

    - name: Display post-bootstrap checklist
      debug:
        msg: |
          Bootstrap complete! Verify:
          1. ArgoCD UI: https://argocd.amer.dev
          2. All apps syncing: kubectl get applications -A
          3. Secrets syncing: kubectl get externalsecrets -A
          4. Runners online: kubectl get autoscalingrunnerset -A

          Secrets created from BWS:
          - repo-k3s-dean-gitops: {{ 'YES' if argocd_repo_pat | length > 0 else 'NO (apply manually)' }}
          - bitwarden-credentials: {{ 'YES' if (bws_access_token | default('') | length > 0) else 'NO (apply manually)' }}
      when: is_first_controller
      tags: [argocd, reminder]