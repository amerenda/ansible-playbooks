---
# Reusable cluster health gate
#
# Include before and after any disruptive operation (k3s restart, etcd migration, etc.)
# Fails if any node is already NotReady, preventing cascading failures.
#
# Usage:
#   - name: Pre-flight health check
#     ansible.builtin.include_tasks: tasks/check-cluster-health.yml
#
# Optional variables:
#   health_check_context: "string describing what operation is about to happen"
#   skip_health_check: true  (bypass — only for recovery/force playbooks)

- name: Skip health check if explicitly bypassed
  ansible.builtin.debug:
    msg: "Health check SKIPPED (skip_health_check=true)"
  when: skip_health_check | default(false) | bool

- name: Run cluster health checks
  when: not (skip_health_check | default(false) | bool)
  block:
    - name: Get node status from k3s
      ansible.builtin.command: kubectl get nodes -o json
      register: node_status
      delegate_to: "{{ groups['controllers'][0] }}"
      changed_when: false
      become: true

    # Do not use nested {% set ready %} in Jinja loops — inner scope does not update outer `ready`,
    # so every node looked NotReady and not_ready_list became a string (join then printed per-char).
    - name: Reset not-ready node list
      ansible.builtin.set_fact:
        not_ready_list: []

    - name: Find not-ready nodes
      ansible.builtin.set_fact:
        not_ready_list: "{{ not_ready_list + [item.metadata.name] }}"
      loop: "{{ (node_status.stdout | from_json)['items'] }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      when: >-
        (
          item.status.conditions | default([])
          | selectattr('type', 'equalto', 'Ready')
          | map(attribute='status')
          | list
          | first | default('Unknown')
        ) != 'True'

    - name: Set total node count for health check
      ansible.builtin.set_fact:
        total_nodes: "{{ (node_status.stdout | from_json)['items'] | length }}"

    - name: "ABORT: Node(s) already NotReady"
      ansible.builtin.fail:
        msg: |
          ==================================================
          CLUSTER HEALTH GATE FAILED
          ==================================================
          NotReady nodes: {{ not_ready_list | join(', ') }}
          Context: {{ health_check_context | default('pre-flight check') }}

          Will not proceed — taking another node offline could
          break etcd quorum and take down the cluster.

          Fix the unhealthy node(s) first, then re-run.
          ==================================================
      when: (not_ready_list | length) > 0

    - name: Verify k3s API is responsive
      ansible.builtin.uri:
        url: "https://{{ hostvars[groups['controllers'][0]]['ansible_host'] }}:6443/healthz"
        method: GET
        validate_certs: false
        status_code: [200, 401]
        timeout: 10
      delegate_to: "{{ groups['controllers'][0] }}"

    - name: Health check passed
      ansible.builtin.debug:
        msg: "All {{ total_nodes }} nodes Ready. Proceeding with: {{ health_check_context | default('operation') }}"
