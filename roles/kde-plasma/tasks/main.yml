---
# Role: kde-plasma
# Installs KDE Plasma 6 + SDDM and enables audio/display services.
# plasma-meta and sddm are already in cachyos_pacman_packages (installed by common role).

# CachyOS ships its own display manager, plasma-login-manager (plasmalogin.service), enabled
# by default instead of sddm.service — they both want to own
# /etc/systemd/system/display-manager.service, so forcing sddm on top of an already-working
# plasmalogin fails ("File ... already exists and is a symlink to ... plasmalogin.service").
# Converge instead of fight the distro default: only enable sddm as a fallback if no display
# manager is enabled yet; leave an already-working one (plasmalogin or otherwise) alone.
- name: Check which display manager is currently enabled
  ansible.builtin.stat:
    path: /etc/systemd/system/display-manager.service
  register: cachyos_display_manager_link
  tags: [kde, sddm]

- name: Enable SDDM display manager (only if no display manager is enabled yet)
  ansible.builtin.systemd:
    name: sddm
    enabled: true
    state: started
  when: not cachyos_display_manager_link.stat.exists
  tags: [kde, sddm]

- name: Enable avahi mDNS daemon
  ansible.builtin.systemd:
    name: avahi-daemon
    enabled: true
    state: started
  tags: [kde, avahi]

- name: Ensure /etc/sddm.conf.d exists
  ansible.builtin.file:
    path: /etc/sddm.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [kde, sddm]

- name: Configure SDDM to use Wayland session
  ansible.builtin.copy:
    content: |
      [Autologin]
      Session=plasma.desktop

      [General]
      DisplayServer=wayland
      GreeterEnvironment=QT_WAYLAND_SHELL_INTEGRATION=layer-shell

      [Wayland]
      SessionDir=/usr/share/wayland-sessions
    dest: /etc/sddm.conf.d/kde_settings.conf
    owner: root
    group: root
    mode: "0644"
  tags: [kde, sddm, wayland]

- name: Ensure SDDM .config directory exists
  ansible.builtin.file:
    path: /var/lib/sddm/.config
    state: directory
    owner: sddm
    group: sddm
    mode: "0700"
  tags: [kde, sddm, display]

- name: Deploy kwinoutputconfig.json for SDDM greeter
  ansible.builtin.copy:
    src: sddm-kwinoutputconfig.json
    dest: /var/lib/sddm/.config/kwinoutputconfig.json
    owner: sddm
    group: sddm
    mode: "0644"
  tags: [kde, sddm, display]

- name: Set KDE dark theme via kwriteconfig6
  ansible.builtin.shell: |
    kwriteconfig6 --file kdeglobals --group General --key ColorScheme BreezeDark
    kwriteconfig6 --file kdeglobals --group KDE --key widgetStyle Breeze
    kwriteconfig6 --file plasmarc --group Theme --key name breeze-dark
  become: false
  args:
    executable: /bin/bash
  changed_when: false
  tags: [kde, theme]
