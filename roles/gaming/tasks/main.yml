---
# Role: gaming
# Steam, Proton-GE (AUR), Lutris, GameMode, MangoHud — all from cachyos_pacman_packages
# and cachyos_aur_packages (installed by common / desktop-apps roles).
# This role installs AUR gaming packages and sets up GameMode.

- name: Install AUR gaming packages
  ansible.builtin.shell: |
    set -euo pipefail
    paru -S --noconfirm --needed {{ item }}
  args:
    executable: /bin/bash
  become: false
  register: gaming_aur_result
  changed_when: "'there is nothing to do' not in gaming_aur_result.stdout"
  loop:
    - proton-ge-custom-bin
    - game-devices-udev
  tags: [gaming, aur]

- name: Add user to gamemode group
  ansible.builtin.user:
    name: "{{ cachyos_user }}"
    groups:
      - gamemode
    append: true
  failed_when: false
  tags: [gaming, groups]

- name: Enable GameMode daemon
  ansible.builtin.systemd:
    name: gamemoded
    enabled: true
    state: started
  failed_when: false
  tags: [gaming, gamemode]

- name: Configure Steam to use Proton-GE by default
  ansible.builtin.file:
    path: "{{ cachyos_user_home }}/.steam"
    state: directory
    owner: "{{ cachyos_user }}"
    group: "{{ cachyos_user }}"
    mode: "0755"
  become: false
  tags: [gaming, steam]

# ── Autostart (keep Steam warm for MoonDeck) ───────────────────────────────────
# MoonDeckBuddy cold-launches Steam on stream start. If Steam has a pending
# client update, that launch turns into a ~20s self-update-and-restart cycle,
# which drops the "open in Big Picture" flag entirely (the restart is a bare
# relaunch) — Buddy sees "Steam is no longer running" mid-update and ends the
# session before Big Picture ever opens. Keeping Steam always running (already
# updated) means MoonDeck only ever has to switch mode on a live process.

- name: Install steam autostart systemd --user unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Steam (kept running for MoonDeck)
      After=graphical-session.target
      PartOf=graphical-session.target

      [Service]
      ExecStart=/usr/bin/steam -silent
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=graphical-session.target
    dest: "{{ cachyos_user_home }}/.config/systemd/user/steam.service"
    owner: "{{ cachyos_user }}"
    group: "{{ cachyos_user }}"
    mode: "0644"
  become: false
  tags: [gaming, steam, service]

- name: Wait for user systemd bus socket
  ansible.builtin.wait_for:
    path: "/run/user/{{ cachyos_user_uid }}/bus"
    timeout: 10
  become: false
  tags: [gaming, steam, service]

- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: false
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ cachyos_user_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ cachyos_user_uid }}/bus"
  tags: [gaming, steam, service]

- name: Enable and start steam user service
  ansible.builtin.systemd:
    name: steam.service
    enabled: true
    state: started
    scope: user
  become: false
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ cachyos_user_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ cachyos_user_uid }}/bus"
  tags: [gaming, steam, service]
