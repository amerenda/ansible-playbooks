---
# Role: moondeck
# MoonDeckBuddy — adds Steam Deck-like streaming features to Moonlight.
# Installed via AUR (moondeckbuddy-appimage, in cachyos_aur_packages — see
# roles/desktop-apps for the paru install loop) into /usr/bin/MoonDeckBuddy
# and /usr/bin/MoonDeckStream.
#
# This role only wires up the gamescope wrapper script and the systemd
# --user service. MoonDeckBuddy binds :59999 and is queried by the Moonlight
# client + Sunshine's local API — nothing launches it, so it needs its own
# autostart, handled here rather than a manual per-shell launch (which is
# fragile: a long-lived shell's DISPLAY/XAUTHORITY go stale across compositor
# restarts, but systemd --user always has the current session's env).

- name: Remove legacy /opt/moondeck raw-AppImage install (superseded by AUR package)
  ansible.builtin.file:
    path: /opt/moondeck
    state: absent
  tags: [moondeck]

- name: Remove legacy /opt/moondeck PATH entry
  ansible.builtin.file:
    path: /etc/profile.d/moondeck.sh
    state: absent
  tags: [moondeck]

- name: Install gamescope wrapper script
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      MONITOR="HDMI-A-1"   # dummy
      exec gamescope -O "$MONITOR" -- "$@"
    dest: /usr/local/bin/moondeck-gamescope.sh
    owner: "{{ cachyos_user }}"
    group: "{{ cachyos_user }}"
    mode: "0755"
  tags: [moondeck]

# ── Service ────────────────────────────────────────────────────────────────────

- name: Install moondeckbuddy systemd --user unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=MoonDeckBuddy
      After=graphical-session.target
      PartOf=graphical-session.target

      [Service]
      ExecStart=/usr/bin/MoonDeckBuddy
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=graphical-session.target
    dest: "{{ cachyos_user_home }}/.config/systemd/user/moondeckbuddy.service"
    owner: "{{ cachyos_user }}"
    group: "{{ cachyos_user }}"
    mode: "0644"
  become: false
  tags: [moondeck, service]

- name: Enable user lingering so systemd user instance runs without active login
  ansible.builtin.command: loginctl enable-linger {{ cachyos_user }}
  changed_when: false
  tags: [moondeck, service]

- name: Wait for user systemd bus socket
  ansible.builtin.wait_for:
    path: "/run/user/{{ cachyos_user_uid }}/bus"
    timeout: 10
  become: false
  tags: [moondeck, service]

- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: false
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ cachyos_user_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ cachyos_user_uid }}/bus"
  tags: [moondeck, service]

- name: Enable and start moondeckbuddy user service
  ansible.builtin.systemd:
    name: moondeckbuddy.service
    enabled: true
    state: started
    scope: user
  become: false
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ cachyos_user_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ cachyos_user_uid }}/bus"
  tags: [moondeck, service]

# ── Firewall (UFW) ────────────────────────────────────────────────────────────

- name: Allow MoonDeckBuddy TCP port through UFW
  community.general.ufw:
    rule: allow
    port: "59999"
    proto: tcp
    comment: "MoonDeckBuddy"
  tags: [moondeck, ufw]
