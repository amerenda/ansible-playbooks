---
# Role: sunshine
# Sunshine game stream host (AUR) — VA-API/KWin capture on AMD Wayland desktop.
# Installs package, scripts, config, and enables user service.

# ── Dependencies ───────────────────────────────────────────────────────────────

- name: Add user to input and realtime groups (Sunshine needs /dev/input access and priority scheduling)
  ansible.builtin.user:
    name: "{{ cachyos_user }}"
    groups:
      - input
      - realtime
    append: true
  tags: [sunshine, groups]

- name: Allow Sunshine encoding threads to reach nice -15 (override realtime group's -11 cap)
  ansible.builtin.copy:
    content: |
      # Allow {{ cachyos_user }} to set process priority as low as nice -20.
      # Sunshine's encoding threads request nice -15; the realtime group only allows -11.
      {{ cachyos_user }} - nice -20
    dest: /etc/security/limits.d/91-sunshine-nice.conf
    owner: root
    group: root
    mode: "0644"
  tags: [sunshine, groups]

- name: Install sunshine from AUR
  ansible.builtin.shell: |
    set -euo pipefail
    paru -S --noconfirm --needed sunshine
  args:
    executable: /bin/bash
  become: false
  register: sunshine_aur_result
  changed_when: "'there is nothing to do' not in sunshine_aur_result.stdout"
  tags: [sunshine, aur]

# ── Scripts ────────────────────────────────────────────────────────────────────

- name: Install sunshine prep/undo scripts from joystick-notify repo
  ansible.builtin.copy:
    src: "{{ cachyos_joystick_notify_src }}/sunshine/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: root
    group: root
    mode: "0755"
  loop:
    - sunshine-couch-prep.sh
    - sunshine-couch-undo.sh
    # Shared with joystick-notify's local couch-mode activate/teardown (lib/status-notify.sh
    # set_screen_lock) — prevents the screen locking mid-session, on either trigger path.
    - couch-mode-screen-unlock.sh
    # Holds ScreenSaver.Inhibit() cookie for the session lifetime; started by
    # sunshine-couch-prep.sh and killed by sunshine-couch-undo.sh.
    - screen-lock-inhibit-daemon.sh
    # Integration test — run manually to verify the unlock script works end-to-end.
    - test-screen-unlock.sh
  tags: [sunshine, scripts]

- name: Install launch-bigpicture script (used by sunshine apps.json)
  ansible.builtin.copy:
    src: "{{ cachyos_joystick_notify_src }}/scripts/launch-bigpicture.sh"
    dest: /usr/local/bin/launch-bigpicture.sh
    owner: root
    group: root
    mode: "0755"
  tags: [sunshine, scripts]

# cursor-stream-hide/show scripts — install only if present in the repo
- name: Install cursor-stream scripts if present in sunshine dir
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/usr/local/bin/{{ item | basename }}"
    owner: root
    group: root
    mode: "0755"
  with_fileglob:
    - "{{ cachyos_joystick_notify_src }}/sunshine/cursor-stream-*.sh"
  tags: [sunshine, scripts]

# ── Config ─────────────────────────────────────────────────────────────────────

- name: Ensure ~/.config/sunshine exists
  ansible.builtin.file:
    path: "{{ cachyos_user_home }}/.config/sunshine"
    state: directory
    owner: "{{ cachyos_user }}"
    group: "{{ cachyos_user }}"
    mode: "0755"
  become: false
  tags: [sunshine, config]

- name: Install sunshine.conf
  ansible.builtin.template:
    src: sunshine.conf.j2
    dest: "{{ cachyos_user_home }}/.config/sunshine/sunshine.conf"
    owner: "{{ cachyos_user }}"
    group: "{{ cachyos_user }}"
    mode: "0644"
  become: false
  tags: [sunshine, config]

- name: Install sunshine apps.json
  ansible.builtin.copy:
    src: apps.json
    dest: "{{ cachyos_user_home }}/.config/sunshine/apps.json"
    owner: "{{ cachyos_user }}"
    group: "{{ cachyos_user }}"
    mode: "0644"
  become: false
  tags: [sunshine, config]

# ── Udev / cap_sys_admin ───────────────────────────────────────────────────────

- name: Add udev rule so Sunshine can access /dev/uinput without root
  ansible.builtin.copy:
    content: |
      KERNEL=="uinput", GROUP="input", MODE="0660", OPTIONS+="static_node=uinput"
    dest: /etc/udev/rules.d/85-sunshine-uinput.rules
    owner: root
    group: root
    mode: "0644"
  notify: Reload udev rules
  tags: [sunshine, udev]

# ── Service ────────────────────────────────────────────────────────────────────

- name: Enable user lingering so systemd user instance runs without active login
  ansible.builtin.command: loginctl enable-linger {{ cachyos_user }}
  changed_when: false
  tags: [sunshine, service]

- name: Wait for user systemd bus socket
  ansible.builtin.wait_for:
    path: "/run/user/{{ cachyos_user_uid }}/bus"
    timeout: 10
  become: false
  tags: [sunshine, service]

- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: false
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ cachyos_user_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ cachyos_user_uid }}/bus"
  tags: [sunshine, service]

- name: Enable and start sunshine user service
  ansible.builtin.systemd:
    # The AUR sunshine package ships app-dev.lizardbyte.app.Sunshine.service, not
    # sunshine.service — verified via `pacman -Ql sunshine | grep systemd`.
    name: app-dev.lizardbyte.app.Sunshine.service
    enabled: true
    state: started
    scope: user
  become: false
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ cachyos_user_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ cachyos_user_uid }}/bus"
  tags: [sunshine, service]

# ── Handlers ───────────────────────────────────────────────────────────────────
# (inline — handlers not supported in role tasks list directly; use notify target)
