# k3s Cluster Configuration Variables

# Security - Set your k3s token
# k3s_token: "your-secure-token-here"  # Uncomment and set your token

# BWS (Bitwarden Secrets Manager) secret IDs
# All UUIDs live here — fetch-secrets.yml iterates over this dict.
# To get values: bws secret get <UUID> --access-token <TOKEN>
bws_secrets:
  k3s_token: "ab7a85fd-3e47-4493-8ed1-b373011bdbb0"        # k3s-dean-etcd-token
  argocd_repo_pat: "42ea6b6b-3b1e-43d9-8743-b41301665cc9"
  bitwarden_eso_api_key: ""                                # TODO: create in BWS
  bitwarden_eso_org_id: ""                                 # TODO: create in BWS
  docker_hub_token: "c5ad7fae-2f58-4a8b-9651-b413001cad7f"

# Filesystem configuration
# resize_rootfs: true  # Set to true to resize root filesystem to use all available space

# k3s version
k3s_version: "v1.33.5+k3s1"

# Network configuration
cluster_cidr: "10.42.0.0/16"
service_cidr: "10.43.0.0/16"
cluster_dns: "10.43.0.10"

# etcd configuration
etcd_data_dir: "/var/lib/rancher/k3s/server/db"
etcd_snapshot_retention: 12
etcd_snapshot_schedule: "*/5 * * * *"  # Every 5 minutes (etcd runs on tmpfs)
etcd_snapshot_compress: true

# Longhorn configuration
longhorn_storage_class: "longhorn"
longhorn_replica_count: 3

# Longhorn storage node control
# Set to false to exclude this node from Longhorn storage
# Default: true (all nodes can store Longhorn data)
# Example: longhorn_storage_enabled: false  # Exclude this node from storage
longhorn_storage_enabled: "{{ longhorn_storage_enabled | default(true) | bool }}"

# Node taints for Longhorn-only nodes
# Simple longhorn taint - only Longhorn pods can schedule here
longhorn_taints:
  - "longhorn:NoSchedule"

# Node labels
# All nodes get the longhorn-storage label so Longhorn can schedule anywhere
longhorn_labels:
  - "longhorn-storage=true"

# Simplified storage system
# All nodes can store Longhorn data (no storage gate)
# Longhorn pods schedule on all nodes with longhorn-storage label
longhorn_storage_label: "longhorn-storage=true"
