---
# Group Variables for the Arch Linux Komodo Periphery host.
# Stacks managed by Komodo (GitOps for Docker Compose) under archlinux/.
# Compose repo: amerenda/komodo-dean-gitops (this host's stacks live in archlinux/)

# Network
archlinux_ip: "10.100.20.25"

# System
timezone: "America/New_York"

# Compose paths (cloned by the playbook).
compose_repo: "https://github.com/amerenda/komodo-dean-gitops.git"
# `target_user` is set in the playbook (defaults to ansible_user).

# bws CLI release for /usr/local/bin/bws (host-side tooling).
bws_version: "2.0.0"

# ─── Bitwarden Secrets Manager ────────────────────────────────────────────
# Reuse the same BWS project as the Mac Mini host. Create a separate machine
# account scoped to read access, and pass its access token via:
#   --extra-vars "bws_access_token=<TOKEN>"
#
# Required secrets (project: k3s) — machine account must READ all of these:
#   komodo-dean-passkey            — Periphery + Core Variable sync
#   komodo-dean-admin-password     — Core HTTP API login (Variable KOMODO_PERIPHERY_PASSKEY)
#   do-dns-api-key                 — DigitalOcean API token for media.amer.dev dyndns (BWS key name)
komodo_periphery_passkey_bws_uuid: "239d3146-6227-4e87-a56b-b417012a693c"

# Komodo Core (mac-mini-m4) — LAN API used by setup-archlinux-komodo.yml to push
# the same komodo-dean-passkey into the Core Variable referenced by ResourceSync
# (fixes archlinux server "Not Okay" / Invalid passkey when UI variable drifted).
komodo_core_url: "http://10.100.20.18:9120"
komodo_core_admin_password_bws_uuid: "44e040b1-20d8-4f7e-bbfa-b417012a69f9"
komodo_periphery_passkey_variable_name: "KOMODO_PERIPHERY_PASSKEY"
komodo_core_sync_passkey: true

# BWS secret `do-dns-api-key` (same token pre-deploy uses for DO_API_TOKEN).
media_server_do_api_token_bws_uuid: "d043a77f-ca1e-4ac6-8cfa-b38200f7b6c9"

# ─── Media-server host directories ────────────────────────────────────────
# Pre-created by setup-archlinux-komodo.yml (owner 1000:1000).
media_config_root: "/mnt/storage/media/config"
media_data_root: "/mnt/storage"
