---
# Group Variables for Mac Mini M4 (Docker host via OrbStack)
# Services managed by Komodo (GitOps for Docker Compose)
# Compose repo: amerenda/mac-mini-compose

# Network
macmini_ip: "10.100.20.18"
gateway: "10.100.20.1"

# Homebrew packages (macOS host tools)
homebrew_packages:
  - git
  - jq
  - htop
  - tailscale
  - kubernetes-cli
  - bitwarden-sdk-secrets

# System
timezone: "America/New_York"

# Container images
ha_version: "2026.1.2"

# ─── Bitwarden Secrets Manager ────────────────────────────────────────────
# Each entry maps a secret file name to a Bitwarden secret ID.
# Create these secrets in Bitwarden Secrets Manager before running the playbook.
#
# Required secrets:
#   komodo-db-password        — Postgres/FerretDB database password
#   komodo-core-passkey       — Komodo Core ↔ Periphery authentication
#   komodo-core-webhook-secret — GitHub webhook HMAC validation
#   komodo-core-jwt-secret    — JWT signing for Komodo web sessions
#   komodo-core-admin-password — Initial Komodo admin user password
#
# To find secret IDs: bws secret list --access-token <TOKEN>
# Replace the placeholder UUIDs below with your actual Bitwarden secret IDs.
komodo_bws_secrets:
  - name: komodo-db-password
    bws_id: "REPLACE_WITH_BWS_SECRET_ID"
  - name: komodo-core-passkey
    bws_id: "REPLACE_WITH_BWS_SECRET_ID"
  - name: komodo-core-webhook-secret
    bws_id: "REPLACE_WITH_BWS_SECRET_ID"
  - name: komodo-core-jwt-secret
    bws_id: "REPLACE_WITH_BWS_SECRET_ID"
  - name: komodo-core-admin-password
    bws_id: "REPLACE_WITH_BWS_SECRET_ID"
