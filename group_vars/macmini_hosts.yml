# Future: Voice LLM, GitHub runner, Technitium DNS (Phase 2)

# Network
macmini_ip: "10.100.20.18"
gateway: "10.100.20.1"

# Homebrew packages (macOS host tools)
homebrew_packages:
  - git
  - jq
  - htop
  - tailscale
  - kubernetes-cli

# System
timezone: "America/New_York"

# Container images
ha_version: "2026.1.2"
