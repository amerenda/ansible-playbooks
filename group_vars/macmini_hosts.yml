---
# Group Variables for Mac Mini M4 (Docker host via OrbStack)
# Services managed by Komodo (GitOps for Docker Compose)
# Compose repo: amerenda/mac-mini-compose

# Network
macmini_ip: "10.100.20.18"
gateway: "10.100.20.1"

# Homebrew packages (macOS host tools)
homebrew_packages:
  - git
  - jq
  - htop
  - tailscale
  - kubernetes-cli
  - bitwarden-sdk-secrets

# System
timezone: "America/New_York"

# Container images
ha_version: "2026.1.2"

# ─── Bitwarden Secrets Manager ────────────────────────────────────────────
# Each entry maps a secret file name to a Bitwarden secret ID.
# Create these secrets in Bitwarden Secrets Manager before running the playbook.
#
# Required secrets (project: k3s):
#   komodo-dean-db-password      — Postgres/FerretDB database password
#   komodo-dean-passkey          — Komodo Core ↔ Periphery authentication
#   komodo-dean-webhook-secret   — GitHub webhook HMAC validation
#   komodo-dean-jwt-secret       — JWT signing for Komodo web sessions
#   komodo-dean-admin-password   — Initial Komodo admin user password
#   github-app-arc-id            — GitHub App ID (shared with k3s ARC runners)
#   github-app-arc-private-key   — GitHub App private key (shared with k3s ARC runners)
#
# To find secret IDs: bws secret list --access-token <TOKEN>
# Replace the placeholder UUIDs below with your actual Bitwarden secret IDs.
komodo_bws_secrets:
  - name: komodo-dean-db-password
    bws_id: "REPLACE_WITH_BWS_SECRET_ID"
  - name: komodo-dean-passkey
    bws_id: "REPLACE_WITH_BWS_SECRET_ID"
  - name: komodo-dean-webhook-secret
    bws_id: "REPLACE_WITH_BWS_SECRET_ID"
  - name: komodo-dean-jwt-secret
    bws_id: "REPLACE_WITH_BWS_SECRET_ID"
  - name: komodo-dean-admin-password
    bws_id: "REPLACE_WITH_BWS_SECRET_ID"

# Runner secrets (reuse existing GitHub App from k3s ARC setup)
runner_bws_secrets:
  - name: github-app-arc-id
    bws_id: "REPLACE_WITH_BWS_SECRET_ID"
  - name: github-app-arc-private-key
    bws_id: "REPLACE_WITH_BWS_SECRET_ID"
