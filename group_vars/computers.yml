---
# Workstation / Komodo Periphery hosts (inventory group `computers` + `archlinux_komodo_hosts`).
# Per-host LAN IP for playbook summary: set `archlinux_ip` on the host in inventory.ini.

timezone: "America/New_York"
cachyos_workstation_enabled: true

# Note: no `code` (official repo VSCode) here — it conflicts with `visual-studio-code-bin`
# below (AUR, same provided files/binary). Verified by actually attempting the install:
# "code-1.127.0-1 and visual-studio-code-bin-1.90.2-1 are in conflict". Keeping the AUR
# build since that's what's actually installed/in use (proper MS marketplace access).
archlinux_workstation_pacman_packages:
  - docker
  - docker-compose
  - jq
  - git
  - curl
  - unzip
  - base-devel
  - zsh
  - tmux
  - vim
  - firefox
  - steam
  - cryptomator
  - kubectl
  - helm
  - terraform
  - tflint
  - github-cli
  - direnv
  - restic
  - yq
  - httpie
  - xclip
  - wget
  - openssl
  - bc
  - gnupg
  - python
  - python-pip
  - go
  - jdk-openjdk
  - git-lfs
  - openvpn
  - yubikey-manager
  - docker-buildx
  - bitwarden
  - nordvpn
  # bitwarden-cli intentionally excluded: current repo version hard-depends on the specific
  # `nodejs-lts-jod` package, which conflicts with plain `nodejs` (already installed on
  # archlinux for other dev tooling — they can't coexist, same file ownership). Verified by
  # actually attempting the install: `pacman -Sy --needed ... bitwarden-cli` failed with
  # "nodejs-lts-jod and nodejs are in conflict". The Bitwarden desktop app (`bitwarden`,
  # above) already covers vault access; add bitwarden-cli back only if something later
  # genuinely needs the `bw` CLI, in which case plain `nodejs` will need to go.

archlinux_workstation_aur_packages:
  - cursor-bin
  - dropbox
  - visual-studio-code-bin
  # No nordvpn-bin here (decision: keep official nordvpn). It conflicts with `nordvpn`
  # (official repo package, community/extra) — verified by actually attempting the install:
  # "nordvpn-bin-5.2.0-1 and nordvpn-3.17.0-1 are in conflict." nordvpn is what's actually
  # installed and running (nordvpnd.service) on archlinux; add it to
  # archlinux_workstation_pacman_packages below if it ever needs to be ansible-managed.
  - nordpass-bin
  - kubectx
  - d2-bin

archlinux_workstation_enable_services:
  - docker

archlinux_workstation_verify_commands:
  - steam
  - firefox
  - code
  - cursor
  - dropbox
  - cryptomator
  - docker
  - kubectl
  - terraform
  - bws
  - bitwarden
  - nordvpn

compose_repo: "git@github.com:amerenda/komodo-dean-gitops.git"
bws_version: "2.0.0"

komodo_periphery_passkey_bws_uuid: "239d3146-6227-4e87-a56b-b417012a693c"
komodo_core_url: "http://10.100.20.18:9120"
komodo_core_admin_password_bws_uuid: "44e040b1-20d8-4f7e-bbfa-b417012a69f9"
komodo_bws_access_token_ro_bws_uuid: "bc877861-0217-476e-bb58-b417012e990b"
komodo_periphery_passkey_variable_name: "KOMODO_PERIPHERY_PASSKEY"
komodo_core_sync_passkey: true
media_server_do_api_token_bws_uuid: "d043a77f-ca1e-4ac6-8cfa-b38200f7b6c9"

media_config_root: "/mnt/storage/media/config"
media_data_root: "/mnt/storage"
